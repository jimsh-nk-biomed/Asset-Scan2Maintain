<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asset Scan2Maintain</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial;
  background:#eef2f5;
  margin:0;
  padding:15px;
}

.card{
  max-width:380px;
  margin:auto;
  background:#fff;
  padding:15px;
  border-radius:15px;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
  margin-top:15px;
}

.title{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:#003366;
}

.logo{text-align:center;}
.logo img{max-width:100%;}

.row{
  display:grid;
  grid-template-columns:140px 10px auto;
  margin:6px 0;
}

.label{font-weight:bold;}
.colon{text-align:center;}
.value{font-size:15px;}

.box{
  border:2px solid #007bff;
  border-radius:10px;
  padding:10px;
  margin-top:12px;
  background:#f4f9ff;
}

.box-title{
  color:#007bff;
  font-weight:bold;
  margin-bottom:5px;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:#1e6bb8;
  color:white;
  font-size:15px;
}

.btn-row{
  display:flex;
  gap:5px;
}

.small-btn{
  flex:1;
  padding:8px;
  background:#28a745;
}

.approve{
  background:#28a745;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:6px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="card">
<div class="title">Asset Scan2Maintain</div>
<div class="logo"><img src="logo.jpg"></div>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<div id="msg" style="color:red;text-align:center;"></div>
</div>

<!-- SCANNER -->
<div id="scannerPage" style="display:none;">
<div class="card">

<div class="logo"><img src="logo.jpg"></div>
<div class="title">Asset Scan2Maintain</div>

<button onclick="logout()" style="background:red;">Logout</button>

<div id="reader"></div>
<div id="assetCard"></div>

</div>
</div>

<script>

/* ===== CONFIG ===== */
const SHEET_ID="1SjnaZ-OLmpZ95qr-yoMWvVGd52GCY0ziRaMqjkVq0ZY";
const LOGIN_URL=`https://opensheet.elk.sh/${SHEET_ID}/Users`;
const ASSET_URL=`https://opensheet.elk.sh/${SHEET_ID}/Equipment`;

/* ===== LOGIN ===== */
function login(){
fetch(LOGIN_URL)
.then(r=>r.json())
.then(data=>{

let u=username.value.trim();
let p=password.value.trim();

let f=data.find(x =>
String(x.Username).trim()===u &&
String(x.Password).trim()===p
);

if(!f){ msg.innerHTML="Invalid Login"; return; }

/* STORE PERMISSIONS (STRICT YES CHECK) */
localStorage.setItem("login","yes");
localStorage.setItem("Install",(f.Installation==="Yes")?"Yes":"No");
localStorage.setItem("IQ",(f.IQ==="Yes")?"Yes":"No");
localStorage.setItem("OQ",(f.OQ==="Yes")?"Yes":"No");
localStorage.setItem("PQ",(f.PQ==="Yes")?"Yes":"No");
localStorage.setItem("PMS",(f.PMS==="Yes")?"Yes":"No");
localStorage.setItem("Cal",(f.Calibration==="Yes")?"Yes":"No");
localStorage.setItem("Approve",(f.Approve==="Yes")?"Yes":"No");

showScanner();

});
}

/* AUTO LOGIN */
if(localStorage.getItem("login")==="yes"){ showScanner(); }

function logout(){
localStorage.clear();
location.reload();
}

/* ===== SHOW SCANNER ===== */
function showScanner(){
loginPage.style.display="none";
scannerPage.style.display="block";
startScanner();
}

/* ===== SHOW ASSET ===== */
function showAsset(a){

let html=`

<div class="row"><div class="label">Asset No</div><div class="colon">:</div><div class="value">${a.Asset_No}</div></div>
<div class="row"><div class="label">Department</div><div class="colon">:</div><div class="value">${a.Department}</div></div>
<div class="row"><div class="label">Equipment</div><div class="colon">:</div><div class="value">${a.Equipment}</div></div>
<div class="row"><div class="label">Model</div><div class="colon">:</div><div class="value">${a.Model}</div></div>
<div class="row"><div class="label">Make</div><div class="colon">:</div><div class="value">${a.Make}</div></div>
<div class="row"><div class="label">Serial No</div><div class="colon">:</div><div class="value">${a.Serial_No}</div></div>

<div class="box">
<div class="box-title">PMS</div>
<div class="row"><div class="label">Done On</div><div class="colon">:</div><div class="value">${a.PMS_Done_On||"-"}</div></div>
<div class="row"><div class="label">Due On</div><div class="colon">:</div><div class="value">${a.PMS_Due_On||"-"}</div></div>
</div>

<div class="box">
<div class="box-title">Calibration</div>
<div class="row"><div class="label">Done On</div><div class="colon">:</div><div class="value">${a.Calibration_Done_On||"-"}</div></div>
<div class="row"><div class="label">Due On</div><div class="colon">:</div><div class="value">${a.Calibration_Due_On||"-"}</div></div>
</div>
`;

/* ===== BUTTON CONTROL ===== */

if(localStorage.getItem("Install")==="Yes")
html+=`<button onclick="openPDF('${a.Installation_PDF}')">Installation Report</button>`;

if(localStorage.getItem("PMS")==="Yes")
html+=`<button onclick="openPDF('${a.PMS_PDF}')">PMS Report</button>`;

if(localStorage.getItem("Cal")==="Yes")
html+=`<button onclick="openPDF('${a.Calibration_PDF}')">Calibration Report</button>`;

/* IQ OQ PQ */
if(localStorage.getItem("IQ")==="Yes" ||
   localStorage.getItem("OQ")==="Yes" ||
   localStorage.getItem("PQ")==="Yes"){

html+=`<div class="btn-row">`;

if(localStorage.getItem("IQ")==="Yes")
html+=`<button class="small-btn" onclick="openPDF('${a.IQ_PDF}')">IQ</button>`;

if(localStorage.getItem("OQ")==="Yes")
html+=`<button class="small-btn" onclick="openPDF('${a.OQ_PDF}')">OQ</button>`;

if(localStorage.getItem("PQ")==="Yes")
html+=`<button class="small-btn" onclick="openPDF('${a.PQ_PDF}')">PQ</button>`;

html+=`</div>`;
}

/* APPROVE BUTTON (STRICT CONTROL) */
if(localStorage.getItem("Approve")==="Yes"){
html+=`<button class="approve">APPROVED</button>`;
}

assetCard.innerHTML=html;
}

/* ===== PDF ===== */
function openPDF(url){
if(!url)return alert("PDF not available");
window.open(url);
}

/* ===== SCANNER ===== */
function startScanner(){

const qr=new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(cams=>{

let back=cams.find(c=>c.label.toLowerCase().includes("back")) || cams[cams.length-1];

qr.start(back.id,{fps:10,qrbox:250},txt=>{

qr.stop();

fetch(ASSET_URL)
.then(r=>r.json())
.then(data=>{
let a=data.find(x=>x.Asset_No===txt.trim());
if(!a)return alert("Asset not found");
showAsset(a);
});

});

});

}

</script>

</body>
</html>
