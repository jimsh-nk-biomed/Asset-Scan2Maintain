<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asset Scan2Maintain</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial;
  background:#eef2f5;
  margin:0;
  padding:15px;
}

/* CARD */
.card{
  max-width:380px;
  margin:auto;
  background:#fff;
  padding:15px;
  border-radius:15px;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
  margin-top:15px;
}

/* TITLE */
.title{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:#003366;
}

/* LOGO */
.logo{
  text-align:center;
}
.logo img{
  max-width:100%;
  border-radius:6px;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:140px 10px auto;
  margin:6px 0;
}

.label{font-weight:bold;}
.colon{text-align:center;}
.value{font-size:15px;}

/* BOX */
.box{
  border:2px solid #007bff;
  border-radius:10px;
  padding:10px;
  margin-top:12px;
  background:#f4f9ff;
}

.box-title{
  color:#007bff;
  font-weight:bold;
  margin-bottom:5px;
}

/* BUTTONS */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#0066cc;
  color:white;
  font-size:15px;
}

.approve{
  background:#28a745;
  font-weight:bold;
}

/* LOGIN */
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:6px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="card">

<div class="title">Asset Scan2Maintain</div>

<div class="logo">
<img src="logo.jpg">
</div>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="msg" style="color:red;text-align:center;"></div>

</div>

<!-- SCANNER -->
<div id="scannerPage" style="display:none;">

<div class="card">

<div class="logo">
<img src="logo.jpg">
</div>

<div class="title">Asset Scan2Maintain</div>

<button onclick="logout()" style="background:red;">Logout</button>

<div id="reader"></div>

<div id="assetCard"></div>

</div>

</div>

<script>

/* ===== SHEET ===== */
const SHEET_ID="1SjnaZ-OLmpZ95qr-yoMWvVGd52GCY0ziRaMqjkVq0ZY";
const LOGIN_URL=`https://opensheet.elk.sh/${SHEET_ID}/Users`;
const ASSET_URL=`https://opensheet.elk.sh/${SHEET_ID}/Equipment`;

/* ===== LOGIN ===== */
function login(){

fetch(LOGIN_URL)
.then(r=>r.json())
.then(data=>{

let u=username.value.trim();
let p=password.value.trim();

let f=data.find(x =>
String(x.Username).trim()===u &&
String(x.Password).trim()===p
);

if(!f){ msg.innerHTML="Invalid Login"; return; }

localStorage.setItem("login","yes");
showScanner();

});
}

if(localStorage.getItem("login")==="yes"){ showScanner(); }

function logout(){
localStorage.clear();
location.reload();
}

/* ===== SHOW SCANNER ===== */
function showScanner(){
loginPage.style.display="none";
scannerPage.style.display="block";
startScanner();
}

/* ===== DATE ===== */
function parseDate(d){
if(!d)return null;
let p=d.split(/[-\/]/);
return new Date(p[2],p[1]-1,p[0]);
}

function getStatus(d,days){
let dt=parseDate(d);
if(!dt)return "";
let exp=new Date(dt);
exp.setDate(exp.getDate()+days);
let diff=(exp-new Date())/(1000*60*60*24);
if(diff<0)return "red";
if(diff<20)return "orange";
return "green";
}

/* ===== PDF ===== */
function openPDF(url){
if(!url)return alert("PDF not available");
window.open(url);
}

/* ===== SHOW ASSET ===== */
function showAsset(a){

let html=`

<div class="row"><div class="label">Asset No</div><div class="colon">:</div><div class="value">${a.Asset_No}</div></div>
<div class="row"><div class="label">Department</div><div class="colon">:</div><div class="value">${a.Department}</div></div>
<div class="row"><div class="label">Equipment</div><div class="colon">:</div><div class="value">${a.Equipment}</div></div>
<div class="row"><div class="label">Model</div><div class="colon">:</div><div class="value">${a.Model}</div></div>
<div class="row"><div class="label">Make</div><div class="colon">:</div><div class="value">${a.Make}</div></div>
<div class="row"><div class="label">Serial No</div><div class="colon">:</div><div class="value">${a.Serial_No}</div></div>

<div class="box">
<div class="box-title">PMS</div>
<div class="row"><div class="label">Done On</div><div class="colon">:</div><div class="value">${a.PMS_Done_On||"-"}</div></div>
<div class="row"><div class="label">Due On</div><div class="colon">:</div><div class="value">${a.PMS_Due_On||"-"}</div></div>
</div>

<div class="box">
<div class="box-title">Calibration</div>
<div class="row"><div class="label">Done On</div><div class="colon">:</div><div class="value">${a.Calibration_Done_On||"-"}</div></div>
<div class="row"><div class="label">Due On</div><div class="colon">:</div><div class="value">${a.Calibration_Due_On||"-"}</div></div>
</div>

<button onclick="openPDF('${a.Installation_PDF}')">Installation Report</button>

<button onclick="openPDF('${a.PMS_PDF}')">PMS Report</button>

<button onclick="openPDF('${a.Calibration_PDF}')">Calibration Report</button>

<button class="approve" onclick="approveAsset('${a.Asset_No}')">APPROVED</button>

`;

assetCard.innerHTML=html;
}

/* ===== APPROVE ===== */
function approveAsset(assetNo){
alert("Asset "+assetNo+" Approved ✅");

/* OPTIONAL: send to Google Sheet (advanced) */
}

/* ===== SCANNER BACK CAMERA ===== */
function startScanner(){

const qr=new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(cams=>{

let back=cams.find(c=>c.label.toLowerCase().includes("back"))||cams[cams.length-1];

qr.start(back.id,{fps:10,qrbox:250},txt=>{

qr.stop();

fetch(ASSET_URL)
.then(r=>r.json())
.then(data=>{
let a=data.find(x=>x.Asset_No===txt.trim());
if(!a)return alert("Asset not found");
showAsset(a);
});

});

});

}

</script>

</body>
</html>
