<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Scan2Maintain</title>

<style>
body {
  font-family: Arial;
  background: #eef2f5;
  padding: 15px;
}

.logo { text-align:center; }
.logo img { max-height:70px; }

h2 { text-align:center; color:#003366; }

#reader { max-width:350px; margin:auto; }

.card {
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

.row{
  display:grid;
  grid-template-columns:140px 10px auto;
  margin-bottom:5px;
}

.btn{
  width:100%;
  padding:10px;
  margin-top:6px;
  background:#0066cc;
  color:#fff;
  border:none;
  border-radius:6px;
}

.small-btn{
  flex:1;
  padding:8px;
  background:#28a745;
  color:#fff;
  border:none;
  border-radius:6px;
}

.btn-row{
  display:flex;
  gap:5px;
}
</style>
</head>

<body>

<script>
/* LOGIN CHECK */
if(localStorage.getItem("login")!=="yes"){
  window.location.href="index.html";
}
</script>

<div class="logo">
<img src="logo.jpg">
</div>

<h2>Asset Scan2Maintain</h2>

<div id="reader"></div>
<div id="assetCard" class="card" style="display:none;"></div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

const SHEET_URL =
"https://opensheet.elk.sh/1SjnaZ-OLmpZ95qr-yoMWvVGd52GCY0ziRaMqjkVq0ZY/Equipment";

function openPDF(url){
if(!url) return alert("Not available");
window.open(url,"_blank");
}

function showAsset(a){

let html = `
<div class="row"><b>Asset</b><div>:</div><div>${a.Asset_No}</div></div>
<div class="row"><b>Equipment</b><div>:</div><div>${a.Equipment}</div></div>
<hr>
`;

/* BUTTON CONTROL */
if(localStorage.getItem("canInstall")=="Yes")
html += `<button class="btn" onclick="openPDF('${a.Installation_PDF}')">Installation</button>`;

if(localStorage.getItem("canIQ")=="Yes" ||
   localStorage.getItem("canOQ")=="Yes" ||
   localStorage.getItem("canPQ")=="Yes"){

html += `<div class="btn-row">`;

if(localStorage.getItem("canIQ")=="Yes")
html += `<button class="small-btn" onclick="openPDF('${a.IQ_PDF}')">IQ</button>`;

if(localStorage.getItem("canOQ")=="Yes")
html += `<button class="small-btn" onclick="openPDF('${a.OQ_PDF}')">OQ</button>`;

if(localStorage.getItem("canPQ")=="Yes")
html += `<button class="small-btn" onclick="openPDF('${a.PQ_PDF}')">PQ</button>`;

html += `</div>`;
}

if(localStorage.getItem("canPMS")=="Yes")
html += `<button class="btn" onclick="openPDF('${a.PMS_PDF}')">PMS</button>`;

if(localStorage.getItem("canCal")=="Yes")
html += `<button class="btn" onclick="openPDF('${a.Calibration_PDF}')">Calibration</button>`;

document.getElementById("assetCard").innerHTML = html;
document.getElementById("assetCard").style.display="block";
}

/* QR */
const qr = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(cams => {
const cam = cams[0];

qr.start(cam.id, {fps:10, qrbox:250}, txt => {

qr.stop();

fetch(SHEET_URL)
.then(r=>r.json())
.then(data=>{
let asset = data.find(x=>x.Asset_No==txt.trim());
if(!asset) return alert("Not found");
showAsset(asset);
});

});

});

</script>

</body>
</html>
