<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Asset Scan2Maintain</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#eef2f5;
  margin:0;
  padding:15px;
}

.card{
  max-width:380px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
  margin-top:20px;
}

.title{
  text-align:center;
  font-weight:bold;
  font-size:20px;
  color:#003366;
}

.logo{
  text-align:center;
  margin:10px 0;
}
.logo img{
  max-height:80px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#0066cc;
  color:white;
  font-size:15px;
  cursor:pointer;
}

.small-btn{
  padding:8px;
  font-size:13px;
  margin:3px;
  width:32%;
  background:#28a745;
}

.btn-row{
  display:flex;
  justify-content:space-between;
}

#reader{
  width:100%;
  max-width:320px;
  margin:auto;
}

.row{
  display:grid;
  grid-template-columns:120px 10px auto;
  margin-bottom:5px;
}

.label{font-weight:bold;}
.colon{text-align:center;}
.value{font-size:14px;}

.green{color:#0f5132;font-weight:bold;}
.amber{color:#856404;font-weight:bold;}
.red{color:#842029;font-weight:bold;}

fieldset{
  border:2px solid #007bff;
  border-radius:8px;
  padding:10px;
  margin-top:10px;
  background:#f4f9ff;
}
legend{
  font-weight:bold;
  color:#007bff;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="card">

<div class="title">Asset Scan2Maintain</div>

<div class="logo">
<img src="logo.jpg">
</div>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="msg" style="color:red;text-align:center;"></div>

</div>

<!-- SCANNER -->
<div id="scannerPage" style="display:none;">

<div class="card">
<div class="title">Asset Scan2Maintain</div>

<button onclick="logout()" style="background:red;">Logout</button>

<div id="reader"></div>
<div id="assetCard"></div>

</div>

</div>

<script>

/* ===== SHEET CONFIG ===== */
const SHEET_ID="1SjnaZ-OLmpZ95qr-yoMWvVGd52GCY0ziRaMqjkVq0ZY";

const LOGIN_URL=`https://opensheet.elk.sh/${SHEET_ID}/Users`;
const ASSET_URL=`https://opensheet.elk.sh/${SHEET_ID}/Equipment`;

/* ===== LOGIN ===== */
function login(){

let u=username.value.trim();
let p=password.value.trim();

fetch(LOGIN_URL)
.then(r=>r.json())
.then(data=>{

let f=data.find(x =>
String(x.Username).trim()===u &&
String(x.Password).trim()===p
);

if(!f){
msg.innerHTML="Invalid Login";
return;
}

localStorage.setItem("login","yes");
localStorage.setItem("IQ",f.IQ||"No");
localStorage.setItem("OQ",f.OQ||"No");
localStorage.setItem("PQ",f.PQ||"No");
localStorage.setItem("Install",f.Installation||"No");
localStorage.setItem("PMS",f.PMS||"No");
localStorage.setItem("Cal",f.Calibration||"No");

showScanner();

});
}

/* AUTO LOGIN */
if(localStorage.getItem("login")==="yes"){
showScanner();
}

/* ===== SHOW SCANNER ===== */
function showScanner(){
loginPage.style.display="none";
scannerPage.style.display="block";
startScanner();
}

/* ===== LOGOUT ===== */
function logout(){
localStorage.clear();
location.reload();
}

/* ===== DATE ===== */
function parseDate(d){
if(!d)return null;
let p=d.split("-");
return new Date(p[2],p[1]-1,p[0]);
}

function getStatus(d,days){
let dt=parseDate(d);
if(!dt)return "";

let exp=new Date(dt);
exp.setDate(exp.getDate()+days);

let diff=(exp-new Date())/(1000*60*60*24);

if(diff<0)return "red";
if(diff<=20)return "amber";
return "green";
}

/* ===== PDF ===== */
function openPDF(url){
if(!url)return alert("PDF not available");
window.open(url);
}

/* ===== SHOW ASSET ===== */
function showAsset(a){

let html=`<div class="row"><div class="label">Asset</div><div class="colon">:</div><div class="value">${a.Asset_No}</div></div>`;

/* INSTALL */
if(localStorage.getItem("Install")==="Yes")
html+=`<button onclick="openPDF('${a.Installation_PDF}')">Installation</button>`;

/* IQ OQ PQ */
if(localStorage.getItem("IQ")==="Yes"||
   localStorage.getItem("OQ")==="Yes"||
   localStorage.getItem("PQ")==="Yes"){

html+=`<div class="btn-row">`;

if(localStorage.getItem("IQ")==="Yes")
html+=`<button class="small-btn" onclick="openPDF('${a.IQ_PDF}')">IQ</button>`;

if(localStorage.getItem("OQ")==="Yes")
html+=`<button class="small-btn" onclick="openPDF('${a.OQ_PDF}')">OQ</button>`;

if(localStorage.getItem("PQ")==="Yes")
html+=`<button class="small-btn" onclick="openPDF('${a.PQ_PDF}')">PQ</button>`;

html+=`</div>`;
}

/* PMS */
if(localStorage.getItem("PMS")==="Yes")
html+=`<button onclick="openPDF('${a.PMS_PDF}')">PMS</button>`;

/* CAL */
if(localStorage.getItem("Cal")==="Yes")
html+=`<button onclick="openPDF('${a.Calibration_PDF}')">Calibration</button>`;

assetCard.innerHTML=html;
}

/* ===== SCANNER (BACK CAMERA FIX) ===== */
function startScanner(){

const qr=new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(cams=>{

/* PRIORITY: BACK CAMERA */
let backCam=cams.find(c =>
c.label.toLowerCase().includes("back") ||
c.label.toLowerCase().includes("rear")
);

/* FALLBACK */
let cam=backCam || cams[cams.length-1];

qr.start(
cam.id,
{fps:10,qrbox:250},
txt=>{

qr.stop();

fetch(ASSET_URL)
.then(r=>r.json())
.then(data=>{
let a=data.find(x=>x.Asset_No===txt.trim());
if(!a)return alert("Asset not found");
showAsset(a);
});

}
);

});

}

</script>

</body>
</html>
