<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login</title>

<style>
body{
  font-family:Arial;
  background:#eef2f5;
  padding:20px;
}

.box{
  max-width:380px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
  text-align:center;
}

.title{
  font-size:20px;
  font-weight:bold;
  color:#003366;
}

.logo img{
  max-height:80px;
  margin:10px 0;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  background:#0066cc;
  color:#fff;
  border:none;
  border-radius:6px;
}

#msg{
  color:red;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<div class="title">Asset Scan2Maintain</div>

<div class="logo">
  <img src="logo.jpg" alt="Company Logo">
</div>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="msg"></div>

</div>

<script>

const SHEET_ID = "1SjnaZ-OLmpZ95qr-yoMWvVGd52GCY0ziRaMqjkVq0ZY";
const LOGIN_URL = `https://opensheet.elk.sh/${SHEET_ID}/Users`;

function login(){

let u = document.getElementById("username").value.trim();
let p = document.getElementById("password").value.trim();

if(!u || !p){
document.getElementById("msg").innerHTML="Enter username & password";
return;
}

document.getElementById("msg").innerHTML="Checking...";

fetch(LOGIN_URL)
.then(r=>r.json())
.then(data=>{

let found = data.find(x =>
x.Username==u && x.Password==p
);

if(found){

localStorage.setItem("login","yes");

/* permissions */
localStorage.setItem("canInstall",found.Installation||"No");
localStorage.setItem("canIQ",found.IQ||"No");
localStorage.setItem("canOQ",found.OQ||"No");
localStorage.setItem("canPQ",found.PQ||"No");
localStorage.setItem("canPMS",found.PMS||"No");
localStorage.setItem("canCal",found.Calibration||"No");

/* OPEN SCANNER */
window.location.href = "scanner.html";

}else{
document.getElementById("msg").innerHTML="Invalid login";
}

})
.catch(()=>{
document.getElementById("msg").innerHTML="Sheet connection error";
});

}

</script>

</body>
</html>
