<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asset Scan2Maintain</title>


<script src="https://unpkg.com/html5-qrcode"></script>



<style>


body{

font-family:Arial, sans-serif;

background:#eef2f5;

margin:0;

padding:10px;

}



.card{

max-width:420px;

margin:auto;

background:white;

padding:15px;

border-radius:15px;

box-shadow:0px 2px 10px #aaa;

}



.logo{

text-align:center;

}



.logo img{

width:160px;

max-width:90%;

}



.title{

text-align:center;

font-size:24px;

font-weight:bold;

color:#003366;

margin:15px;

}



input{

width:100%;

padding:12px;

margin-top:10px;

border-radius:8px;

border:1px solid #ccc;

font-size:15px;

box-sizing:border-box;

}



button{

width:100%;

padding:12px;

margin-top:10px;

border:none;

border-radius:8px;

background:#0066cc;

color:white;

font-size:16px;

}



.logout{

background:red;

}



.back{

background:#ff9800;

}



#scannerPage{

display:none;

}



#reader{

margin-top:15px;

}



.row{

display:grid;

grid-template-columns:130px 10px auto;

margin:8px 0;

font-size:14px;

}



.label{

font-weight:bold;

color:#003366;

}



.box{

border:1px solid #007bff;

border-radius:10px;

padding:12px;

margin-top:12px;

background:#f8fbff;

}



.box-title{

font-size:18px;

font-weight:bold;

color:#007bff;

margin-bottom:10px;

}



.small{

font-size:13px;

text-align:center;

color:red;

margin-top:10px;

}



</style>


</head>



<body>



<!-- ================= LOGIN PAGE ================= -->


<div id="loginPage" class="card">


<div class="logo">

<img src="logo.jpg">

</div>



<div class="title">

Asset Scan2Maintain

</div>



<input

id="username"

placeholder="Username">


<input

id="password"

type="password"

placeholder="Password">



<button onclick="login()">

LOGIN

</button>



<div id="msg" class="small"></div>


</div>






<!-- ================= SCANNER PAGE ================= -->


<div id="scannerPage">


<div class="card">


<div class="logo">

<img src="logo.jpg">

</div>



<div class="title">

Asset Scan2Maintain

</div>



<div id="reader"></div>



<div id="assetCard"></div>



<button class="back" onclick="scanAgain()">

SCAN AGAIN

</button>



<button class="logout" onclick="logout()">

LOGOUT

</button>



</div>


</div>







<script>



/*************************************************
 CONFIGURATION
*************************************************/


const LICENSE_API =

"https://script.google.com/macros/s/AKfycbyE7UtLzwYfv8RmHM5Yhm6_II89j3Vae-mcIJgCKJNb5A1oRZKh840enZyRqaLnKMXasA/exec";





let equipmentData=[];


let userData=[];


let qrScanner=null;



let currentUser={};



let hospitalID="";


let licenseKey="";


let licenseDays=0;



/*************************************************
 LOGIN FUNCTION
*************************************************/


function login(){


let username =

document.getElementById("username")
.value
.trim();



let password =

document.getElementById("password")
.value
.trim();




if(
username=="" ||
password==""
){


document.getElementById("msg").innerHTML =

"Enter username and password";


return;


}




/*
LOAD USERS THROUGH LICENSE SERVER
*/


fetch(

LICENSE_API+

"?action=users"

)



.then(response=>response.json())



.then(users=>{



console.log(
"USERS DATA:",
users
);



if(
users.status
&&
users.status!="VALID"
){


document.getElementById("msg").innerHTML=

"Unable to load users";


return;


}




userData=users;




let user = users.find(u=>


String(u.Username || "")
.trim()
.toLowerCase()

===

username.toLowerCase()


&&


String(u.Password || "")
.trim()

===

password



);





if(!user){


document.getElementById("msg").innerHTML=

"Invalid Username or Password";


return;


}





/*
SAVE USER DETAILS
*/


currentUser=user;



hospitalID =

user.Hospital_ID;



licenseKey =

user.License_Key;




localStorage.setItem(
"login",
"YES"
);



localStorage.setItem(
"Hospital_ID",
hospitalID
);



localStorage.setItem(
"License_Key",
licenseKey
);





/*
SAVE PERMISSIONS
*/


localStorage.setItem(
"Installation",
user.Installation || "No"
);



localStorage.setItem(
"IQ",
user.IQ || "No"
);



localStorage.setItem(
"OQ",
user.OQ || "No"
);



localStorage.setItem(
"PQ",
user.PQ || "No"
);



localStorage.setItem(
"PMS",
user.PMS || "No"
);



localStorage.setItem(
"Calibration",
user.Calibration || "No"
);



localStorage.setItem(
"Approve",
user.Approve || "No"
);




localStorage.setItem(

"Auto_Logoff_Minutes",

user.Auto_Logoff_Minutes || 60

);





localStorage.setItem(

"loginTime",

Date.now()

);





/*
CHECK LICENSE
*/


checkLicense();



})



.catch(error=>{


console.log(error);



document.getElementById("msg").innerHTML=

"Login Error";


});



}








/*************************************************
 LICENSE CHECK
*************************************************/


function checkLicense(){



let url =

LICENSE_API +

"?action=license" +

"&hospitalID=" +

encodeURIComponent(hospitalID)

+

"&key=" +

encodeURIComponent(licenseKey);





fetch(url)



.then(response=>response.json())



.then(data=>{



console.log(
"LICENSE:",
data
);





if(

String(data.status)
.toUpperCase()

!=

"VALID"

){


document.body.innerHTML=

`

<div style="
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-family:Arial;
">

<h2 style="color:red">

LICENSE EXPIRED

<br><br>

Contact Administrator

</h2>

</div>

`;



return;


}




licenseDays=data.days;



loadEquipment();



})



.catch(error=>{


console.log(error);



alert(
"License verification failed"
);


});



}








/*************************************************
 LOAD EQUIPMENT SECURELY
*************************************************/


function loadEquipment(){



let url =

LICENSE_API +

"?action=equipment" +

"&hospitalID=" +

encodeURIComponent(hospitalID)

+

"&key=" +

encodeURIComponent(licenseKey);





fetch(url)



.then(response=>response.json())



.then(data=>{



console.log(
"EQUIPMENT:",
data
);




if(
data.status
&&
data.status!="VALID"

){


alert(
"Equipment loading failed"
);


return;


}




equipmentData=data;



console.log(

"TOTAL EQUIPMENT:",

equipmentData.length

);



openScanner();



})



.catch(error=>{


console.log(error);



alert(
"Unable to load equipment"
);


});



}
/*************************************************
 OPEN QR SCANNER
*************************************************/


function openScanner(){


document.getElementById("loginPage")
.style.display="none";



document.getElementById("scannerPage")
.style.display="block";



startQRScanner();



}






/*************************************************
 START QR SCANNER
*************************************************/


function startQRScanner(){



document.getElementById("reader")
.innerHTML="";



qrScanner =
new Html5Qrcode("reader");





Html5Qrcode.getCameras()


.then(cameras=>{



if(
!cameras ||
cameras.length==0
){


alert(
"No camera detected"
);


return;


}




let cameraId =
cameras[0].id;





qrScanner.start(


cameraId,


{

fps:10,

qrbox:250

},



(decodedText)=>{



console.log(
"SCANNED QR:",
decodedText
);





qrScanner.stop()

.then(()=>{



/*
CLEAN QR VALUE
*/


let scannedValue =

String(decodedText)

.trim()

.toUpperCase()

.replace(/\s/g,'');





console.log(
"CLEAN QR:",
scannedValue
);





/*
FIND ASSET
*/


let asset =

equipmentData.find(item=>{



let sheetAsset =

String(item.Asset_No || "")

.trim()

.toUpperCase()

.replace(/\s/g,'');





return sheetAsset === scannedValue;



});







if(!asset){



alert(

"ASSET NOT FOUND\n\n"

+

"Scanned:\n"

+

scannedValue

);



startQRScanner();


return;


}





showAsset(asset);



});




},



(error)=>{


// ignore scanning errors


}



)


.catch(error=>{


console.log(error);


alert(
"Camera start failed"
);


});



})


.catch(error=>{


console.log(error);


alert(
"Camera permission error"
);


});



}








/*************************************************
 SCAN AGAIN
*************************************************/


function scanAgain(){



document.getElementById("assetCard")
.innerHTML="";



startQRScanner();



}
/*************************************************
 DISPLAY ASSET DETAILS
*************************************************/


function showAsset(a){



let html = `



<div class="box">


<div class="box-title">

Equipment Details

</div>




<div class="row">
<div class="label">Asset No</div>
<div>:</div>
<div>${a.Asset_No || "-"}</div>
</div>



<div class="row">
<div class="label">Department</div>
<div>:</div>
<div>${a.Department || "-"}</div>
</div>




<div class="row">
<div class="label">Equipment</div>
<div>:</div>
<div>${a.Equipment || "-"}</div>
</div>




<div class="row">
<div class="label">Model</div>
<div>:</div>
<div>${a.Model || "-"}</div>
</div>




<div class="row">
<div class="label">Make</div>
<div>:</div>
<div>${a.Make || "-"}</div>
</div>




<div class="row">
<div class="label">Serial No</div>
<div>:</div>
<div>${a.Serial_No || "-"}</div>
</div>



</div>





<div class="box">


<div class="box-title">

PMS Details

</div>



<div class="row">
<div class="label">PMS Done On</div>
<div>:</div>
<div>${a.PMS_Done_On || "-"}</div>
</div>



<div class="row">
<div class="label">PMS Due On</div>
<div>:</div>
<div>${a.PMS_Due_On || "-"}</div>
</div>



<div class="row">
<div class="label">Status</div>
<div>:</div>
<div>${a.PMS_Status || "-"}</div>
</div>



</div>







<div class="box">


<div class="box-title">

Calibration Details

</div>



<div class="row">
<div class="label">Calibration Done</div>
<div>:</div>
<div>${a.Calibration_Done_On || "-"}</div>
</div>



<div class="row">
<div class="label">Calibration Due</div>
<div>:</div>
<div>${a.Calibration_Due_On || "-"}</div>
</div>



<div class="row">
<div class="label">Status</div>
<div>:</div>
<div>${a.CAL_Status || "-"}</div>
</div>



</div>


`;





/*************************************************
 DOCUMENT ACCESS CONTROL
*************************************************/



if(

localStorage.getItem("Installation")

=="Yes"

&&

a.Installation_PDF

){



html += `

<button onclick="openPDF('${a.Installation_PDF}')">

Installation Document

</button>

`;

}




if(

localStorage.getItem("PMS")

=="Yes"

&&

a.PMS_PDF

){



html += `

<button onclick="openPDF('${a.PMS_PDF}')">

PMS Document

</button>

`;

}




if(

localStorage.getItem("Calibration")

=="Yes"

&&

a.Calibration_PDF

){



html += `

<button onclick="openPDF('${a.Calibration_PDF}')">

Calibration Document

</button>

`;

}





if(

localStorage.getItem("IQ")

=="Yes"

&&

a.IQ_PDF

){



html += `

<button onclick="openPDF('${a.IQ_PDF}')">

IQ Document

</button>

`;

}




if(

localStorage.getItem("OQ")

=="Yes"

&&

a.OQ_PDF

){



html += `

<button onclick="openPDF('${a.OQ_PDF}')">

OQ Document

</button>

`;

}




if(

localStorage.getItem("PQ")

=="Yes"

&&

a.PQ_PDF

){



html += `

<button onclick="openPDF('${a.PQ_PDF}')">

PQ Document

</button>

`;

}





if(

localStorage.getItem("Approve")

=="Yes"

){


html += `

<button style="background:#28a745">

APPROVED

</button>

`;

}





document.getElementById("assetCard")
.innerHTML=html;



}







/*************************************************
 OPEN PDF
*************************************************/


function openPDF(url){


if(
!url ||
url==""
){


alert(
"Document not available"
);


return;


}



window.open(
url,
"_blank"
);


}







/*************************************************
 LOGOUT
*************************************************/


function logout(){


localStorage.clear();


location.reload();


}







/*************************************************
 AUTO LOGOUT
*************************************************/


setInterval(function(){



if(

localStorage.getItem("login")

!="YES"

){

return;

}



let loginTime =

Number(

localStorage.getItem("loginTime")

);



let limit =

Number(

localStorage.getItem("Auto_Logoff_Minutes")

);



if(!limit){

limit=60;

}



let used =

(Date.now()-loginTime)

/

60000;




if(

used > limit

){



alert(

"Session expired. Please login again."

);



logout();



}



},30000);





</script>


</body>

</html>
