<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Asset Scan2Maintain
</title>


<script src="https://unpkg.com/html5-qrcode"></script>



<style>


body{

font-family:Arial, sans-serif;

background:#eef2f5;

margin:0;

padding:10px;

}



.card{

max-width:420px;

margin:auto;

background:white;

padding:15px;

border-radius:15px;

box-shadow:0px 2px 10px #aaa;

}



.logo{

text-align:center;

}


.logo img{

width:180px;

max-width:90%;

}




.title{

text-align:center;

font-size:24px;

font-weight:bold;

color:#003366;

margin:15px;

}



input{

width:100%;

padding:12px;

margin-top:10px;

border-radius:8px;

border:1px solid #ccc;

font-size:15px;

box-sizing:border-box;

}



button{

width:100%;

padding:12px;

margin-top:10px;

border:none;

border-radius:8px;

background:#0066cc;

color:white;

font-size:16px;

cursor:pointer;

}



.logout{

background:red;

}



.back{

background:#ff9800;

}



#scannerPage{

display:none;

}



#reader{

margin-top:15px;

}



.row{

display:grid;

grid-template-columns:130px 10px auto;

margin:8px 0;

font-size:14px;

}



.label{

font-weight:bold;

color:#003366;

}



.box{

border:1px solid #007bff;

border-radius:10px;

padding:12px;

margin-top:12px;

background:#f8fbff;

}



.box-title{

font-size:18px;

font-weight:bold;

color:#007bff;

margin-bottom:10px;

}



.message{

text-align:center;

color:red;

margin-top:10px;

font-size:14px;

}



</style>


</head>




<body>



<!-- ================= LOGIN PAGE ================= -->


<div id="loginPage" class="card">



<div class="logo">

<img src="logo.jpg">

</div>



<div class="title">

Asset Scan2Maintain

</div>



<input

id="username"

placeholder="Username"

>



<div style="position:relative;">


<input

id="password"

type="password"

placeholder="Password"

style="padding-right:45px;"

>


<span

onclick="togglePassword()"

style="

position:absolute;

right:15px;

top:22px;

cursor:pointer;

font-size:20px;

">

👁️

</span>


</div>



<button onclick="login()">

LOGIN

</button>



<div id="msg" class="message"></div>



</div>









<!-- ================= SCANNER PAGE ================= -->



<div id="scannerPage">



<div class="card">



<div class="logo">

<img src="logo.jpg">

</div>



<div class="title">

Asset Scan2Maintain

</div>



<div id="reader"></div>



<div id="assetCard"></div>



<button class="back" onclick="scanAgain()">

SCAN AGAIN

</button>



<button class="logout" onclick="logout()">

LOGOUT

</button>



</div>


</div>








<script>



/************************************************
 CONFIGURATION
************************************************/


const LICENSE_API =

"https://script.google.com/macros/s/AKfycbyE7UtLzwYfv8RmHM5Yhm6_II89j3Vae-mcIJgCKJNb5A1oRZKh840enZyRqaLnKMXasA/exec";





let equipmentData=[];


let currentUser={};


let hospitalID="";


let licenseKey="";


let qrScanner=null;


let autoLogoutMinutes=60;


let licenseDays=0;



/************************************************
 LOGIN FUNCTION
************************************************/


function login(){



let username =

document.getElementById("username")
.value
.trim();



let password =

document.getElementById("password")
.value
.trim();





if(username=="" || password==""){


document.getElementById("msg").innerHTML=

"Enter Username and Password";


return;


}






let url =

LICENSE_API

+

"?action=login"

+

"&username="

+

encodeURIComponent(username)

+

"&password="

+

encodeURIComponent(password);





fetch(url)



.then(response=>response.json())



.then(data=>{



console.log(
"LOGIN RESPONSE:",
data
);





if(

String(data.status).toUpperCase()

!=

"VALID"

){


document.getElementById("msg").innerHTML=

"Invalid Username or Password";


return;


}







/*
SAVE USER DATA
*/



currentUser=data.User;



hospitalID=data.Hospital_ID;



licenseKey=data.License_Key;






localStorage.setItem(

"login",

"YES"

);





localStorage.setItem(

"Hospital_ID",

hospitalID

);





localStorage.setItem(

"License_Key",

licenseKey

);






/*
SAVE PERMISSIONS
*/



localStorage.setItem(

"Installation",

data.User.Installation || "No"

);





localStorage.setItem(

"IQ",

data.User.IQ || "No"

);





localStorage.setItem(

"OQ",

data.User.OQ || "No"

);





localStorage.setItem(

"PQ",

data.User.PQ || "No"

);





localStorage.setItem(

"PMS",

data.User.PMS || "No"

);





localStorage.setItem(

"Calibration",

data.User.Calibration || "No"

);





localStorage.setItem(

"Approve",

data.User.Approve || "No"

);





autoLogoutMinutes=

Number(

data.User.Auto_Logoff_Minutes || 60

);





localStorage.setItem(

"Auto_Logoff_Minutes",

autoLogoutMinutes

);





localStorage.setItem(

"loginTime",

Date.now()

);







/*
CHECK LICENSE
*/


checkLicense();



})



.catch(error=>{


console.log(error);



document.getElementById("msg").innerHTML=

"Login Error";


});



}








/************************************************
 LICENSE CHECK
*************************************************/


function checkLicense(){



let url =

LICENSE_API

+

"?action=license"

+

"&hospitalID="

+

encodeURIComponent(hospitalID)

+

"&key="

+

encodeURIComponent(licenseKey);






document.getElementById("msg").innerHTML =
"Checking login...";


fetch(url,
{
method:"GET",
cache:"no-store"
})
.then(response=>response.json())
.then(data=>{



console.log(

"LICENSE RESPONSE:",

data

);






if(

String(data.status).toUpperCase()

!="VALID"

){



document.body.innerHTML=

`

<div style="

height:100vh;

display:flex;

align-items:center;

justify-content:center;

text-align:center;

font-family:Arial;

">


<h2 style="color:red">

LICENSE EXPIRED

<br><br>

Please contact Administrator

</h2>


</div>

`;



return;


}




licenseDays=data.days;




loadEquipment();



})



.catch(error=>{


console.log(error);



alert(

"License verification failed"

);



});



}

 /************************************************
 LOAD EQUIPMENT DATA
************************************************/


function loadEquipment(){



let url =

LICENSE_API

+

"?action=equipment"

+

"&hospitalID="

+

encodeURIComponent(hospitalID)

+

"&key="

+

encodeURIComponent(licenseKey);






fetch(url)



.then(response=>response.json())



.then(data=>{



console.log(

"EQUIPMENT RESPONSE:",

data

);





if(

data.status

&&

data.status!="VALID"

){


alert(

"Unable to load equipment data"

);


return;


}






equipmentData=data;




console.log(

"TOTAL EQUIPMENT:",

equipmentData.length

);





openScanner();



})



.catch(error=>{


console.log(error);



alert(

"Equipment loading failed"

);



});



}









/************************************************
 OPEN SCANNER PAGE
************************************************/


function openScanner(){



document.getElementById("loginPage")

.style.display="none";





document.getElementById("scannerPage")

.style.display="block";





startQRScanner();



}









/************************************************
 START QR SCANNER
************************************************/


function startQRScanner(){



document.getElementById("reader")

.innerHTML="";




qrScanner =

new Html5Qrcode("reader");





Html5Qrcode.getCameras()



.then(cameras=>{



if(

!cameras ||

cameras.length==0

){


alert(

"No camera available"

);


return;


}





let cameraId = null;


// Prefer back camera

for(let i=0;i<cameras.length;i++){

    let label = cameras[i].label.toLowerCase();

    if(
        label.includes("back") ||
        label.includes("rear") ||
        label.includes("environment")
    ){

        cameraId = cameras[i].id;
        break;

    }

}


// If back camera not found use first camera

if(!cameraId){

    cameraId = cameras[0].id;

}







qrScanner.start(



cameraId,



{


fps:10,

qrbox:250


},





(decodedText)=>{



console.log(

"QR SCANNED:",

decodedText

);






qrScanner.stop()

.then(()=>{





/*
CLEAN QR VALUE
*/



let scannedAsset =

String(decodedText)

.trim()

.toUpperCase()

.replace(/\s/g,'')

.replace(/[\r\n]/g,'');






console.log(

"CLEAN QR:",

scannedAsset

);








/*
SEARCH ASSET
*/



let asset =



equipmentData.find(item=>{





let sheetAsset =



String(item.Asset_No || "")

.trim()

.toUpperCase()

.replace(/\s/g,'')

.replace(/[\r\n]/g,'');






return sheetAsset === scannedAsset;



});








if(!asset){



alert(


"ASSET NOT FOUND\n\n"

+

"Scanned:\n"

+

scannedAsset



);



startQRScanner();



return;


}





showAsset(asset);






});



},





(error)=>{


// QR scanning errors ignored



}



)



.catch(error=>{



console.log(error);



alert(

"Camera start error"

);



});





})



.catch(error=>{



console.log(error);



alert(

"Camera permission denied"

);



});



}









/************************************************
 SCAN AGAIN
************************************************/


function scanAgain(){



document.getElementById("assetCard")

.innerHTML="";



startQRScanner();



}
/************************************************
 DATE FORMAT FUNCTION
************************************************/


function formatDate(value){


if(!value || value==""){

return "-";

}



let d = new Date(value);



if(isNaN(d)){


return value;


}



let day =

String(d.getDate())

.padStart(2,"0");



let month =

String(d.getMonth()+1)

.padStart(2,"0");



let year =

d.getFullYear();



return day+"-"+month+"-"+year;



}








/************************************************
 STATUS DISPLAY FUNCTION
************************************************/


function statusDisplay(status){



if(!status || status==""){


return {

text:"-",

color:"black"

};


}





let s = String(status)

.toUpperCase()

.trim();







if(s.includes("OVERDUE")){


return {


text:"🔴 OVERDUE",

color:"red"


};


}







if(s.includes("DUE SOON")){


return {


text:"🟠 DUE SOON",

color:"orange"


};


}







if(s.includes("ACTIVE")){


return {


text:"🟢 ACTIVE",

color:"green"


};


}





return {


text:status,

color:"black"


};


}









/************************************************
 DISPLAY ASSET DETAILS
************************************************/


function showAsset(a){



let pmsStatus = statusDisplay(a.PMS_Status);

let calStatus = statusDisplay(a.CAL_Status);





let html = `




<div class="box">


<div class="box-title">

Equipment Details

</div>





<div class="row">
<div class="label">Asset No</div>
<div>:</div>
<div>${a.Asset_No || "-"}</div>
</div>




<div class="row">
<div class="label">Department</div>
<div>:</div>
<div>${a.Department || "-"}</div>
</div>





<div class="row">
<div class="label">Equipment</div>
<div>:</div>
<div>${a.Equipment || "-"}</div>
</div>





<div class="row">
<div class="label">Model</div>
<div>:</div>
<div>${a.Model || "-"}</div>
</div>





<div class="row">
<div class="label">Make</div>
<div>:</div>
<div>${a.Make || "-"}</div>
</div>





<div class="row">
<div class="label">Serial No</div>
<div>:</div>
<div>${a.Serial_No || "-"}</div>
</div>



</div>










<div class="box">


<div class="box-title">

PMS Details

</div>





<div class="row">
<div class="label">PMS Done</div>
<div>:</div>
<div>${formatDate(a.PMS_Done_On)}</div>
</div>





<div class="row">
<div class="label">PMS Due</div>
<div>:</div>
<div>${formatDate(a.PMS_Due_On)}</div>
</div>





<div class="row">
<div class="label">Status</div>
<div>:</div>

<div style="
font-weight:bold;
color:${pmsStatus.color}
">

${pmsStatus.text}

</div>

</div>



</div>









<div class="box">


<div class="box-title">

Calibration Details

</div>





<div class="row">
<div class="label">Calibration Done</div>
<div>:</div>
<div>${formatDate(a.Calibration_Done_On)}</div>
</div>





<div class="row">
<div class="label">Calibration Due</div>
<div>:</div>
<div>${formatDate(a.Calibration_Due_On)}</div>
</div>





<div class="row">

<div class="label">Status</div>

<div>:</div>


<div style="
font-weight:bold;
color:${calStatus.color}
">

${calStatus.text}

</div>


</div>



</div>



`;









/************************************************
 DOCUMENT ACCESS CONTROL
************************************************/


if(

localStorage.getItem("Installation")=="Yes"

&&

a.Installation_PDF

){


html += `


<button onclick="openPDF('${a.Installation_PDF}')">

Installation Document

</button>


`;

}







if(

localStorage.getItem("PMS")=="Yes"

&&

a.PMS_PDF

){


html += `


<button onclick="openPDF('${a.PMS_PDF}')">

PMS Document

</button>


`;

}







if(

localStorage.getItem("Calibration")=="Yes"

&&

a.Calibration_PDF

){


html += `


<button onclick="openPDF('${a.Calibration_PDF}')">

Calibration Document

</button>


`;

}








if(

localStorage.getItem("IQ")=="Yes"

&&

a.IQ_PDF

){


html += `


button onclick="openPDF('${a.IQ_PDF}')">

IQ Document

</button>


`;

}








if(

localStorage.getItem("OQ")=="Yes"

&&

a.OQ_PDF

){


html += `


<button onclick="openPDF('${a.OQ_PDF}')">

OQ Document

</button>


`;

}








if(

localStorage.getItem("PQ")=="Yes"

&&

a.PQ_PDF

){


html += `


<button onclick="openPDF('${a.PQ_PDF}')">

PQ Document

</button>


`;

}







document.getElementById("assetCard")

.innerHTML=html;



}









/************************************************
 OPEN PDF
************************************************/


function openPDF(url){


if(!url){


alert("Document not available");


return;


}



window.open(

url,

"_blank"

);


}









/************************************************
 LOGOUT
************************************************/


/************************************************
 SECURE LOGOUT FUNCTION
************************************************/


function logout(){



// Stop camera first

if(qrScanner){


qrScanner.stop()

.then(()=>{


console.log("Camera stopped");


})

.catch(error=>{


console.log(
"Camera already stopped"
);


});


}






// Clear all stored data


localStorage.removeItem("login");

localStorage.removeItem("Hospital_ID");

localStorage.removeItem("License_Key");

localStorage.removeItem("Installation");

localStorage.removeItem("IQ");

localStorage.removeItem("OQ");

localStorage.removeItem("PQ");

localStorage.removeItem("PMS");

localStorage.removeItem("Calibration");

localStorage.removeItem("Approve");

localStorage.removeItem("Auto_Logoff_Minutes");

localStorage.removeItem("loginTime");





// Reset variables


equipmentData=[];

currentUser={};

hospitalID="";

licenseKey="";






// Hide scanner page


document.getElementById("scannerPage")

.style.display="none";





// Show login page


document.getElementById("loginPage")

.style.display="block";






// Clear old details


document.getElementById("assetCard")

.innerHTML="";





// Clear username/password


document.getElementById("username").value="";

document.getElementById("password").value="";






alert(

"You have been logged out successfully"

);



}







/************************************************
 AUTO LOGOUT
************************************************/


setInterval(function(){



if(

localStorage.getItem("login")!="YES"

){


return;


}





let loginTime =

Number(

localStorage.getItem("loginTime")

);





let limit =

Number(

localStorage.getItem("Auto_Logoff_Minutes")

);





if(!limit){

limit=60;

}





let used =

(Date.now()-loginTime)

/

60000;





if(

used > limit

){



alert(

"Session expired. Please login again."

);



logout();



}



},30000);



/************************************************
 SHOW / HIDE PASSWORD
************************************************/


function togglePassword(){


let passwordBox =

document.getElementById("password");


let eye =

document.getElementById("eyeIcon");




if(passwordBox.type === "password"){



passwordBox.type="text";


eye.innerHTML="🙈";



}

else{



passwordBox.type="password";


eye.innerHTML="👁️";



}


}

</script>


</body>


</html>
