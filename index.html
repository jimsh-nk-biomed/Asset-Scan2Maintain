<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asset Scan2Maintain</title>


<script src="https://unpkg.com/html5-qrcode"></script>


<style>

body{
font-family:Arial,sans-serif;
background:#eef2f5;
margin:0;
padding:15px;
}


.card{

max-width:400px;
margin:auto;
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 2px 10px #ccc;

}


.title{

text-align:center;
font-size:22px;
font-weight:bold;
color:#003366;
margin-bottom:15px;

}



input{

width:100%;
padding:12px;
margin-top:10px;
box-sizing:border-box;
border-radius:8px;
border:1px solid #ccc;

}



button{

width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#0066cc;
color:white;
font-size:16px;

}



.logout{

background:red;

}



#scannerPage{

display:none;

}



.row{

display:grid;
grid-template-columns:130px 10px auto;
margin:8px 0;

}



.label{

font-weight:bold;

}



.box{

border:1px solid #007bff;
padding:12px;
margin-top:12px;
border-radius:10px;

}



.box-title{

font-weight:bold;
color:#007bff;
font-size:18px;

}


</style>


</head>


<body>



<!-- LOGIN -->

<div id="loginPage" class="card">


<div class="title">

Asset Scan2Maintain

</div>



<input id="username"
placeholder="Username">



<input id="password"
type="password"
placeholder="Password">



<button onclick="login()">

Login

</button>


<div id="msg"></div>


</div>






<!-- SCANNER -->

<div id="scannerPage">


<div class="card">


<div class="title">

Asset Scan2Maintain

</div>



<div id="reader"></div>



<div id="assetCard"></div>



<button onclick="scanAgain()">

Scan Again

</button>



<button class="logout"
onclick="logout()">

Logout

</button>



</div>


</div>






<script>



/************************************************
 CONFIGURATION
************************************************/


const LICENSE_API =
"https://script.google.com/macros/s/AKfycbyE7UtLzwYfv8RmHM5Yhm6_II89j3Vae-mcIJgCKJNb5A1oRZKh840enZyRqaLnKMXasA/exec";



let equipmentData=[];

let userData=[];

let qr=null;



let hospitalID="";

let licenseKey="";




/************************************************
 LOGIN
************************************************/


function login(){



let username =
document.getElementById("username").value.trim();



let password =
document.getElementById("password").value.trim();



if(!username || !password){


document.getElementById("msg").innerHTML =
"Enter username and password";


return;


}



let url =
LICENSE_API+
"?action=users";



fetch(url)

.then(r=>r.json())

.then(users=>{



userData=users;



let user =
users.find(u=>


String(u.Username)
.trim()
.toLowerCase()

===

username.toLowerCase()


&&


String(u.Password)
.trim()

===

password


);



if(!user){


document.getElementById("msg").innerHTML =
"Invalid login";


return;


}



hospitalID =
user.Hospital_ID;



licenseKey =
user.License_Key;



localStorage.setItem(
"Hospital_ID",
hospitalID
);



localStorage.setItem(
"License_Key",
licenseKey
);



checkLicense();



});


}
checkLicense();

});

}
/************************************************
 LICENSE VALIDATION
************************************************/


function checkLicense(){



let url =

LICENSE_API +

"?action=license" +

"&hospitalID=" +

encodeURIComponent(hospitalID)

+

"&key=" +

encodeURIComponent(licenseKey);





fetch(url)


.then(response=>response.json())


.then(data=>{


console.log(
"LICENSE RESPONSE:",
data
);



if(
String(data.status).toUpperCase()
!=="VALID"

){


document.body.innerHTML=

`

<div style="
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-family:Arial;
">


<h2 style="color:red;">

License Expired<br><br>

Please contact Administrator

</h2>


</div>

`;

return;


}



loadEquipment();



})


.catch(error=>{


console.log(error);


alert(
"License verification failed"
);


});


}






/************************************************
 LOAD EQUIPMENT THROUGH LICENSE SERVER
************************************************/


function loadEquipment(){



let url =

LICENSE_API +

"?action=equipment" +

"&hospitalID=" +

encodeURIComponent(hospitalID)

+

"&key=" +

encodeURIComponent(licenseKey);





fetch(url)


.then(response=>response.json())


.then(data=>{



console.log(
"EQUIPMENT DATA:",
data
);



if(
data.status
&&
data.status!=="VALID"

){


alert(
"Unable to load equipment"
);


return;


}



equipmentData=data;



console.log(

"TOTAL ASSETS:",

equipmentData.length

);



showScanner();



})


.catch(error=>{


console.log(error);


alert(
"Equipment loading failed"
);


});


}






/************************************************
 SHOW SCANNER
************************************************/


function showScanner(){



document.getElementById("loginPage")
.style.display="none";



document.getElementById("scannerPage")
.style.display="block";



startScanner();



}






/************************************************
 START QR SCANNER
************************************************/


function startScanner(){



document.getElementById("reader")
.innerHTML="";



qr =
new Html5Qrcode("reader");




Html5Qrcode.getCameras()


.then(cameras=>{



if(!cameras.length){


alert(
"No camera found"
);


return;


}




let cameraId =
cameras[0].id;




qr.start(


cameraId,


{


fps:10,

qrbox:250


},




(decodedText)=>{


console.log(
"QR VALUE:",
decodedText
);




qr.stop()

.then(()=>{



let scanned =

String(decodedText)
.trim()
.toUpperCase();





let asset =

equipmentData.find(item=>{


let assetNo =

String(item.Asset_No || "")

.trim()

.toUpperCase();




return assetNo===scanned;



});





if(!asset){


alert(

"Asset Not Found\n\n"

+

scanned

);



startScanner();


return;


}





showAsset(asset);



});



},



(error)=>{


// scanning errors ignored


}



)


.catch(error=>{


console.log(error);


});



})



.catch(error=>{


console.log(error);


});



}






/************************************************
 SCAN AGAIN
************************************************/


function scanAgain(){



document.getElementById("assetCard")
.innerHTML="";


startScanner();



}
function scanAgain(){

document.getElementById("assetCard")
.innerHTML="";


startScanner();


}
/************************************************
 DISPLAY ASSET DETAILS
************************************************/


function showAsset(a){



let html = `


<div class="box">


<div class="box-title">
Equipment Details
</div>



<div class="row">
<div class="label">Asset No</div>
<div>:</div>
<div>${a.Asset_No || "-"}</div>
</div>



<div class="row">
<div class="label">Department</div>
<div>:</div>
<div>${a.Department || "-"}</div>
</div>



<div class="row">
<div class="label">Equipment</div>
<div>:</div>
<div>${a.Equipment || "-"}</div>
</div>



<div class="row">
<div class="label">Make</div>
<div>:</div>
<div>${a.Make || "-"}</div>
</div>



<div class="row">
<div class="label">Model</div>
<div>:</div>
<div>${a.Model || "-"}</div>
</div>



<div class="row">
<div class="label">Serial No</div>
<div>:</div>
<div>${a.Serial_No || "-"}</div>
</div>



</div>




<div class="box">


<div class="box-title">
PMS Details
</div>



<div class="row">
<div class="label">PMS Done</div>
<div>:</div>
<div>${a.PMS_Done_On || "-"}</div>
</div>



<div class="row">
<div class="label">PMS Due</div>
<div>:</div>
<div>${a.PMS_Due_On || "-"}</div>
</div>



</div>




<div class="box">


<div class="box-title">
Calibration Details
</div>



<div class="row">
<div class="label">Calibration Done</div>
<div>:</div>
<div>${a.Calibration_Done_On || "-"}</div>
</div>



<div class="row">
<div class="label">Calibration Due</div>
<div>:</div>
<div>${a.Calibration_Due_On || "-"}</div>
</div>



</div>


`;





if(a.Installation_PDF){


html += `

<button onclick="openPDF('${a.Installation_PDF}')">

Installation Document

</button>

`;

}



if(a.PMS_PDF){


html += `

<button onclick="openPDF('${a.PMS_PDF}')">

PMS Document

</button>

`;

}



if(a.Calibration_PDF){


html += `

<button onclick="openPDF('${a.Calibration_PDF}')">

Calibration Document

</button>

`;

}



if(a.IQ_PDF){


html += `

<button onclick="openPDF('${a.IQ_PDF}')">

IQ Document

</button>

`;

}



if(a.OQ_PDF){


html += `

<button onclick="openPDF('${a.OQ_PDF}')">

OQ Document

</button>

`;

}



if(a.PQ_PDF){


html += `

<button onclick="openPDF('${a.PQ_PDF}')">

PQ Document

</button>

`;

}



document.getElementById("assetCard")
.innerHTML=html;



}






/************************************************
 OPEN PDF
************************************************/


function openPDF(url){


if(!url){


alert(
"Document not available"
);


return;


}


window.open(
url,
"_blank"
);


}






/************************************************
 LOGOUT
************************************************/


function logout(){


localStorage.clear();


location.reload();


}






/************************************************
 AUTO LOGOUT
************************************************/


setInterval(()=>{


let loginTime =
localStorage.getItem("loginTime");



if(!loginTime){

return;

}



let minutes = 60;



let used =

(Date.now()-Number(loginTime))

/

60000;



if(
used > minutes
){


alert(
"Session expired"
);


logout();


}



},30000);





</script>


</body>

</html>
