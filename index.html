<!DOCTYPE html>

<html>

<head>


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Biomedical Asset Scanner
</title>



<script src="https://unpkg.com/html5-qrcode"></script>




<style>


body{

font-family:Arial, sans-serif;

background:#eef3f7;

margin:0;

padding:10px;

}




.card{

max-width:430px;

margin:auto;

background:white;

padding:15px;

border-radius:15px;

box-shadow:0px 3px 12px #aaa;

}





.logo{

text-align:center;

}



.logo img{

width:180px;

max-width:90%;

}





.title{

text-align:center;

font-size:24px;

font-weight:bold;

color:#003366;

margin:15px;

}





input{

width:100%;

padding:12px;

margin-top:10px;

font-size:16px;

border-radius:8px;

border:1px solid #bbb;

box-sizing:border-box;

}





.passwordBox{

position:relative;

}





.eye{

position:absolute;

right:15px;

top:22px;

font-size:22px;

cursor:pointer;

}





button{


width:100%;

padding:12px;

margin-top:10px;

border:none;

border-radius:8px;

font-size:16px;

background:#0066cc;

color:white;

cursor:pointer;


}




.logout{


background:red;


}





.back{


background:#ff9800;


}






#scannerPage{


display:none;


}






#reader{


margin-top:15px;


}





.message{


text-align:center;

color:red;

margin-top:10px;


}




.row{


display:grid;

grid-template-columns:130px 10px auto;

margin:8px 0;


}





.label{


font-weight:bold;

color:#003366;


}





.box{


border:1px solid #007bff;

border-radius:10px;

padding:12px;

margin-top:12px;

background:#f8fbff;


}





.box-title{


font-size:18px;

font-weight:bold;

color:#0066cc;

margin-bottom:10px;


}





</style>



</head>





<body>







<!-- ================= LOGIN PAGE ================= -->



<div id="loginPage" class="card">





<div class="logo">

<img src="logo.jpg">

</div>





<div class="title">

Biomedical Asset Scanner

</div>






<input

id="username"

placeholder="Username"

>







<div class="passwordBox">


<input

id="password"

type="password"

placeholder="Password"


>



<span

class="eye"

onclick="togglePassword()"

id="eyeIcon"

>

👁️

</span>


</div>







<button onclick="login()">

LOGIN

</button>







<div id="msg" class="message"></div>





</div>









<!-- ================= SCANNER PAGE ================= -->



<div id="scannerPage">





<div class="card">





<div class="logo">


<img src="logo.jpg">


</div>





<div class="title">

Biomedical Asset Scanner

</div>






<div id="reader"></div>





<div id="assetCard"></div>







<button class="back" onclick="scanAgain()">

SCAN AGAIN

</button>







<button class="logout" id="logoutButton">

LOGOUT

</button>






</div>


</div>










<script>




/************************************************
 LICENSE SERVER URL
************************************************/



const LICENSE_API =


"https://script.google.com/macros/s/AKfycbyE7UtLzwYfv8RmHM5Yhm6_II89j3Vae-mcIJgCKJNb5A1oRZKh840enZyRqaLnKMXasA/exec";







/************************************************
 GLOBAL VARIABLES
************************************************/


let equipmentData=[];


let currentUser={};


let hospitalID="";


let licenseKey="";


let modules={};


let qrScanner=null;


let autoLogoutMinutes=60;

/************************************************
 PASSWORD SHOW / HIDE
************************************************/


function togglePassword(){


let pass =

document.getElementById("password");



let eye =

document.getElementById("eyeIcon");





if(pass.type=="password"){


pass.type="text";


eye.innerHTML="🙈";


}

else{


pass.type="password";


eye.innerHTML="👁️";


}


}









/************************************************
 LOGIN FUNCTION
************************************************/


function login(){



let username =

document.getElementById("username")

.value

.trim();





let password =

document.getElementById("password")

.value

.trim();






if(username=="" || password==""){



document.getElementById("msg").innerHTML=

"Enter Username and Password";


return;


}







document.getElementById("msg").innerHTML=

"Checking login...";









let url =

LICENSE_API

+

"?action=login"

+

"&username="

+

encodeURIComponent(username)

+

"&password="

+

encodeURIComponent(password);







fetch(url,

{

method:"GET",

cache:"no-store"

})





.then(response=>response.json())





.then(data=>{





console.log(

"LOGIN RESPONSE",

data

);







if(

String(data.status).toUpperCase()

!="VALID"

){



document.getElementById("msg").innerHTML=

data.message || "Invalid Login";



return;


}









/************************************************
 SAVE USER DETAILS
************************************************/



currentUser=data.User;



hospitalID=data.Hospital_ID;



licenseKey=data.License_Key;



modules=data.Modules;







localStorage.setItem(

"login",

"YES"

);






localStorage.setItem(

"Hospital_ID",

hospitalID

);







localStorage.setItem(

"License_Key",

licenseKey

);







localStorage.setItem(

"Modules",

JSON.stringify(modules)

);







localStorage.setItem(

"Hospital",

data.Hospital

);






localStorage.setItem(

"License_Expiry",

data.License_Expiry

);







localStorage.setItem(

"Days_Left",

data.Days_Left

);








autoLogoutMinutes =

Number(

data.User.Auto_Logoff_Minutes || 60

);







localStorage.setItem(

"Auto_Logoff_Minutes",

autoLogoutMinutes

);







localStorage.setItem(

"loginTime",

Date.now()

);









/************************************************
 AFTER LOGIN
************************************************/



checkLicense();



})



.catch(error=>{


console.log(error);



document.getElementById("msg").innerHTML=

"Server connection error";


});



}









/************************************************
 LICENSE CHECK
************************************************/


function checkLicense(){



let url =

LICENSE_API

+

"?action=license"

+

"&hospitalID="

+

encodeURIComponent(hospitalID)

+

"&key="

+

encodeURIComponent(licenseKey);







fetch(url,

{

cache:"no-store"

})





.then(response=>response.json())





.then(data=>{





console.log(

"LICENSE RESPONSE",

data

);







if(

String(data.status).toUpperCase()

!="VALID"

){



document.body.innerHTML=

`

<div style="

height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:Arial;

text-align:center;

">


<h2 style="color:red">

LICENSE EXPIRED

<br><br>

Please contact administrator

</h2>


</div>

`;



return;


}







loadEquipment();







})



.catch(error=>{


console.log(error);



alert(

"License verification failed"

);



});



}









/************************************************
 LOAD EQUIPMENT DATA
************************************************/


function loadEquipment(){



let url =

LICENSE_API

+

"?action=equipment"

+

"&hospitalID="

+

encodeURIComponent(hospitalID)

+

"&key="

+

encodeURIComponent(licenseKey);







fetch(url,

{

cache:"no-store"

})





.then(response=>response.json())





.then(data=>{





console.log(

"EQUIPMENT DATA",

data

);







if(

data.status

&&

data.status!="VALID"

){



alert(

"Unable to load equipment"

);



return;


}








equipmentData=data;







console.log(

"Equipment Count:",

equipmentData.length

);






openScanner();






})



.catch(error=>{



console.log(error);



alert(

"Equipment loading error"

);



});



}

/************************************************
 OPEN QR SCANNER
************************************************/


function openScanner(){



document.getElementById("loginPage")

.style.display="none";





document.getElementById("scannerPage")

.style.display="block";






startScanner();



}









/************************************************
 START QR SCANNER
************************************************/


function startScanner(){





if(qrScanner){


try{


qrScanner.clear();


}

catch(e){}



}








qrScanner = new Html5Qrcode(

"reader"

);







let config = {


fps:10,


qrbox:{


width:250,


height:250


},



aspectRatio:1.0



};








let cameraConfig = {


facingMode:

{

exact:"environment"

}


};








qrScanner.start(

cameraConfig,

config,



(decodedText)=>{



console.log(

"QR RESULT",

decodedText

);





processQR(decodedText);




},





(errorMessage)=>{



}

)





.catch(error=>{





console.log(

"Back camera failed",

error

);







// fallback camera



Html5Qrcode.getCameras()

.then(cameras=>{



if(cameras && cameras.length){



qrScanner.start(

cameras[cameras.length-1].id,

config,



(decodedText)=>{


processQR(decodedText);


}



);



}



});




});




}









/************************************************
 PROCESS QR RESULT
************************************************/


function processQR(code){





// stop scanning after success


if(qrScanner){



qrScanner.pause(true);



}








let assetNo =

String(code)

.trim();







console.log(

"Searching Asset:",

assetNo

);









let found =

equipmentData.find(function(item){



return String(item.Asset_No)

.trim()

== assetNo;



});









if(!found){



document.getElementById("assetCard")

.innerHTML=



`

<div class="box"


style="

color:red;

text-align:center;

font-weight:bold;

">


Asset Not Found

<br><br>

${assetNo}


</div>

`;




return;



}








console.log(

"ASSET FOUND",

found

);







showAsset(found);





}









/************************************************
 SCAN AGAIN
************************************************/


function scanAgain(){





document.getElementById("assetCard")

.innerHTML="";







if(qrScanner){



try{



qrScanner.resume();



}

catch(e){



startScanner();



}



}




}

/************************************************
 DATE FORMAT
************************************************/


function formatDate(value){


if(!value || value==""){

return "-";

}



let d=new Date(value);



if(isNaN(d)){


return value;


}



let day=

String(d.getDate())

.padStart(2,"0");



let month=

String(d.getMonth()+1)

.padStart(2,"0");



let year=

d.getFullYear();




return day+"-"+month+"-"+year;


}









/************************************************
 STATUS DISPLAY
************************************************/


function statusDisplay(status){



if(!status || status==""){


return {

text:"-",

color:"black"

};


}



let s=

String(status)

.toUpperCase()

.trim();






if(s.includes("OVERDUE")){


return {


text:"🔴 OVERDUE",

color:"red"


};


}





if(s.includes("DUE SOON")){


return {


text:"🟠 DUE SOON",

color:"orange"


};


}






if(s.includes("ACTIVE")){


return {


text:"🟢 ACTIVE",

color:"green"


};


}




return {


text:status,

color:"black"


};


}









/************************************************
 CHECK MODULE ACCESS
************************************************/


function moduleAllowed(name){



let m =

JSON.parse(

localStorage.getItem("Modules")

);





if(!m){

return false;

}




return String(m[name])

.toUpperCase()

=="YES";



}









/************************************************
 SHOW ASSET DETAILS
************************************************/


function showAsset(a){



let pms=

statusDisplay(a.PMS_Status);



let cal=

statusDisplay(a.CAL_Status);







let html=`

<div class="box">


<div class="box-title">

Equipment Details

</div>




<div class="row">

<div class="label">

Asset No

</div>

<div>:</div>

<div>${a.Asset_No || "-"}</div>

</div>





<div class="row">

<div class="label">

Department

</div>

<div>:</div>

<div>${a.Department || "-"}</div>

</div>





<div class="row">

<div class="label">

Equipment

</div>

<div>:</div>

<div>${a.Equipment || "-"}</div>

</div>





<div class="row">

<div class="label">

Model

</div>

<div>:</div>

<div>${a.Model || "-"}</div>

</div>





<div class="row">

<div class="label">

Make

</div>

<div>:</div>

<div>${a.Make || "-"}</div>

</div>





<div class="row">

<div class="label">

Serial No

</div>

<div>:</div>

<div>${a.Serial_No || "-"}</div>

</div>




</div>









<div class="box">


<div class="box-title">

PMS Details

</div>




<div class="row">

<div class="label">

PMS Done

</div>

<div>:</div>

<div>${formatDate(a.PMS_Done_On)}</div>

</div>





<div class="row">

<div class="label">

PMS Due

</div>

<div>:</div>

<div>${formatDate(a.PMS_Due_On)}</div>

</div>





<div class="row">

<div class="label">

Status

</div>

<div>:</div>

<div style="color:${pms.color};font-weight:bold">

${pms.text}

</div>

</div>




</div>









<div class="box">


<div class="box-title">

Calibration Details

</div>





<div class="row">

<div class="label">

Calibration Done

</div>

<div>:</div>

<div>${formatDate(a.Calibration_Done_On)}</div>

</div>





<div class="row">

<div class="label">

Calibration Due

</div>

<div>:</div>

<div>${formatDate(a.Calibration_Due_On)}</div>

</div>





<div class="row">

<div class="label">

Status

</div>

<div>:</div>


<div style="color:${cal.color};font-weight:bold">

${cal.text}

</div>


</div>



</div>



`;









/************************************************
 DOCUMENT BUTTONS
************************************************/



if(moduleAllowed("Installation")

&& a.Installation_PDF){



html+=`

<button onclick="openPDF('${a.Installation_PDF}')">

Installation Document

</button>

`;

}






if(moduleAllowed("IQ")

&& a.IQ_PDF){



html+=`

<button onclick="openPDF('${a.IQ_PDF}')">

IQ Document

</button>

`;

}






if(moduleAllowed("OQ")

&& a.OQ_PDF){



html+=`

<button onclick="openPDF('${a.OQ_PDF}')">

OQ Document

</button>

`;

}






if(moduleAllowed("PQ")

&& a.PQ_PDF){



html+=`

<button onclick="openPDF('${a.PQ_PDF}')">

PQ Document

</button>

`;

}






if(moduleAllowed("PMS")

&& a.PMS_PDF){



html+=`

<button onclick="openPDF('${a.PMS_PDF}')">

PMS Document

</button>

`;

}






if(moduleAllowed("Calibration")

&& a.Calibration_PDF){



html+=`

<button onclick="openPDF('${a.Calibration_PDF}')">

Calibration Document

</button>

`;

}








document.getElementById("assetCard")

.innerHTML=html;



}









/************************************************
 OPEN DOCUMENT
************************************************/


function openPDF(url){


if(!url){


alert("Document not available");


return;


}



window.open(

url,

"_blank"

);


}









/************************************************
 LOGOUT
************************************************/


document.addEventListener(

"DOMContentLoaded",

function(){



let btn=

document.getElementById("logoutButton");




if(btn){



btn.onclick=function(){


logout();


};



}



}

);







function logout(){



if(qrScanner){



try{


qrScanner.stop();


}

catch(e){}



}





localStorage.clear();






equipmentData=[];

currentUser={};

hospitalID="";

licenseKey="";

modules={};







document.getElementById("assetCard")

.innerHTML="";






document.getElementById("scannerPage")

.style.display="none";






document.getElementById("loginPage")

.style.display="block";






document.getElementById("username").value="";

document.getElementById("password").value="";






alert(

"Logged out successfully"

);



}









/************************************************
 AUTO LOGOUT
************************************************/


setInterval(function(){





if(

localStorage.getItem("login")!="YES"

){

return;

}





let loginTime=

Number(

localStorage.getItem("loginTime")

);





let limit=

Number(

localStorage.getItem("Auto_Logoff_Minutes")

);





if(!limit){

limit=60;

}





let used=

(Date.now()-loginTime)

/

60000;






if(used>limit){



logout();



alert(

"Session expired"

);



}





},30000);



 /************************************************
 FORCE LOGOUT BUTTON
************************************************/


window.onload=function(){


let logoutBtn=document.getElementById("logoutButton");



if(logoutBtn){


logoutBtn.onclick=function(){


forceLogout();


};


}


};





function forceLogout(){



console.log("Logout Started");




// Stop camera

if(qrScanner){


try{


qrScanner.stop();


}

catch(e){


console.log(e);


}


}




// Clear all session data


localStorage.removeItem("login");

localStorage.removeItem("Hospital_ID");

localStorage.removeItem("License_Key");

localStorage.removeItem("Installation");

localStorage.removeItem("IQ");

localStorage.removeItem("OQ");

localStorage.removeItem("PQ");

localStorage.removeItem("PMS");

localStorage.removeItem("Calibration");

localStorage.removeItem("Approve");

localStorage.removeItem("Auto_Logoff_Minutes");

localStorage.removeItem("loginTime");






// Reset data


equipmentData=[];

currentUser={};

hospitalID="";

licenseKey="";






// Clear details


document.getElementById("assetCard").innerHTML="";





// Hide scanner


document.getElementById("scannerPage").style.display="none";





// Show login


document.getElementById("loginPage").style.display="block";






// Clear login boxes


document.getElementById("username").value="";

document.getElementById("password").value="";





alert("Logged out successfully");



}
 
</script>


</body>


</html>
