<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Asset Scan2Maintain Login</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#eef2f5;
  margin:0;
  padding:20px;
}

/* CARD */
.box{
  max-width:380px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
  text-align:center;
}

/* TITLE */
.title{
  font-size:20px;
  font-weight:bold;
  color:#003366;
  margin-bottom:10px;
}

/* LOGO */
.logo img{
  max-height:80px;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:6px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:6px;
  background:#0066cc;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

#msg{
  text-align:center;
  color:red;
  margin-top:10px;
}

.small{
  font-size:13px;
  color:#555;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

  <!-- TITLE -->
  <div class="title">Asset Scan2Maintain</div>

  <!-- LOGO -->
  <div class="logo">
    <img src="logo.jpg" alt="Company Logo">
  </div>

  <!-- LOGIN -->
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div id="msg"></div>

</div>

<script>

const SHEET_ID = "1SjnaZ-OLmpZ95qr-yoMWvVGd52GCY0ziRaMqjkVq0ZY";
const LOGIN_SHEET = "Users";
const NEXT_PAGE = "scanner.html";

const LOGIN_URL =
`https://opensheet.elk.sh/${SHEET_ID}/${LOGIN_SHEET}`;

function login(){

let u = document.getElementById("username").value.trim();
let p = document.getElementById("password").value.trim();

if(u==="" || p===""){
document.getElementById("msg").innerHTML="Enter username & password";
return;
}

document.getElementById("msg").innerHTML="Checking...";

fetch(LOGIN_URL)
.then(r=>r.json())
.then(data=>{

let found = data.find(x =>
String(x.Username).trim()===u &&
String(x.Password).trim()===p
);

if(found){

localStorage.setItem("loginUser",u);
localStorage.setItem("canInstall",found.Installation || "No");
localStorage.setItem("canIQ",found.IQ || "No");
localStorage.setItem("canOQ",found.OQ || "No");
localStorage.setItem("canPQ",found.PQ || "No");
localStorage.setItem("canPMS",found.PMS || "No");
localStorage.setItem("canCal",found.Calibration || "No");

window.location.href = NEXT_PAGE;

}else{
document.getElementById("msg").innerHTML="Invalid Login";
}

})
.catch(err=>{
document.getElementById("msg").innerHTML="Google Sheet connection failed";
});

}

</script>

</body>
</html>
