<script>

/* ======================================
CONFIGURATION
====================================== */

// Hospital Google Sheet

const SHEET_ID =
"1SjnaZ-OLmpZ95qr-yoMWvVGd52GCY0ziRaMqjkVq0ZY";


const LOGIN_URL =
`https://opensheet.elk.sh/${SHEET_ID}/Users`;


const ASSET_URL =
`https://opensheet.elk.sh/${SHEET_ID}/Equipment`;


// YOUR CENTRAL LICENSE SERVER

const LICENSE_URL =
"https://script.google.com/macros/s/AKfycbx4iPGSij3YpAKUBMw270RfDGZocIJcnalwfxyuDTKt3e9pIYCp2u0GjmYkGL66tnzt0A/exec";


// HOSPITAL LICENSE DETAILS

const HOSPITAL_ID =
"H001";


const LICENSE_KEY =
"JIMSHNK2026";


let qr;


/* ======================================
LOGIN
====================================== */

function login(){

let u = username.value.trim();
let p = password.value.trim();


if(u==="" || p===""){

msg.innerHTML =
"Please enter username and password";

return;

}



fetch(LOGIN_URL)

.then(response=>response.json())

.then(data=>{


let user = data.find(x =>

String(x.Username).trim() === u &&

String(x.Password).trim() === p

);



if(!user){

msg.innerHTML =
"Invalid Login";

return;

}



/* CLEAR OLD SESSION */

localStorage.clear();



/* SAVE USER RIGHTS */

localStorage.setItem(
"login",
"yes"
);


localStorage.setItem(
"Auto_Logoff_Minutes",
user.Auto_Logoff_Minutes || "30"
);


localStorage.setItem(
"loginTime",
Date.now()
);



localStorage.setItem(
"Install",
user.Installation==="Yes" ? "Yes":"No"
);


localStorage.setItem(
"IQ",
user.IQ==="Yes" ? "Yes":"No"
);


localStorage.setItem(
"OQ",
user.OQ==="Yes" ? "Yes":"No"
);


localStorage.setItem(
"PQ",
user.PQ==="Yes" ? "Yes":"No"
);


localStorage.setItem(
"PMS",
user.PMS==="Yes" ? "Yes":"No"
);


localStorage.setItem(
"Cal",
user.Calibration==="Yes" ? "Yes":"No"
);


localStorage.setItem(
"Approve",
user.Approve==="Yes" ? "Yes":"No"
);



/*
AFTER USER LOGIN
CHECK YOUR CENTRAL LICENSE
*/

checkCentralLicense();



})

.catch(error=>{


console.error(error);


msg.innerHTML =
"Login Server Error";


});


}



/* ======================================
CENTRAL LICENSE CHECK
====================================== */


function checkCentralLicense(){



let url =

LICENSE_URL +

"?hospitalID=" +

encodeURIComponent(HOSPITAL_ID) +

"&key=" +

encodeURIComponent(LICENSE_KEY);



fetch(url)


.then(response=>{


if(!response.ok){

throw new Error(
"License Server Error"
);

}


return response.json();


})


.then(data=>{


console.log(
"Central License:",
data
);



if(
String(data.status).toUpperCase()
!=="VALID"

){


document.body.innerHTML = `

<div class="expired-box">

<div>

<h1>

Subscription Expired

<br><br>

Please contact Administrator

</h1>

</div>

</div>

`;


return;


}



/*
SAVE CENTRAL EXPIRY
*/

localStorage.setItem(
"Central_Expiry",
data.expiry || ""
);



/*
CHECK EXPIRY WARNING
*/

showExpiryPopupIfNeeded(
data.expiry
);



})


.catch(error=>{


console.error(error);


document.body.innerHTML = `

<div class="expired-box">

<div>

<h1>

Unable to verify subscription

<br><br>

Please check internet connection

</h1>

</div>

</div>

`;

});


}

/* ======================================
LICENSE EXPIRY POPUP
====================================== */

function showExpiryPopupIfNeeded(expiryDate){


if(!expiryDate){

showScanner();

return;

}


let today = new Date();

let expiry = new Date(expiryDate);


today.setHours(0,0,0,0);

expiry.setHours(0,0,0,0);



let difference =
expiry - today;



let daysLeft = Math.ceil(

difference /
(1000 * 60 * 60 * 24)

);



/*
NO EXPIRY DATE
*/

if(isNaN(daysLeft)){

showScanner();

return;

}



/*
EXPIRED
*/

if(daysLeft < 0){

document.body.innerHTML = `

<div class="expired-box">

<div>

<h1>

Subscription Expired

<br><br>

Please contact Administrator

</h1>

</div>

</div>

`;

return;

}



/*
SHOW WARNING WITHIN 15 DAYS
*/

if(daysLeft <= 15){


const popup =
document.createElement("div");


popup.className =
"popup-overlay";


popup.innerHTML = `

<div class="popup-box">

<h2>
License Notice
</h2>


<p>

Your subscription expires on

<br><br>

<b>${expiryDate}</b>

<br><br>

${daysLeft} day(s) remaining.

</p>


<p>

Please renew before expiry.

</p>


</div>

`;



document.body.appendChild(popup);



setTimeout(()=>{


popup.remove();


showScanner();


},4000);



}

else{


showScanner();


}


}



/* ======================================
AUTO LOGIN CHECK
====================================== */


window.onload=function(){

checkAutoLogin();

};




function checkAutoLogin(){


/*
NO USER LOGIN
SHOW LOGIN PAGE
*/

if(
localStorage.getItem("login")
!=="yes"

){

return;

}




/*
CHECK CENTRAL LICENSE
*/

let expiryDate =
localStorage.getItem("Central_Expiry");



if(expiryDate){


let today =
new Date();


let expiry =
new Date(expiryDate);



today.setHours(0,0,0,0);

expiry.setHours(0,0,0,0);



if(today > expiry){


localStorage.clear();



document.body.innerHTML = `

<div class="expired-box">

<div>

<h1>

Your subscription has expired.

<br><br>

Please contact Administrator

</h1>

</div>

</div>

`;


return;


}


}




/*
CHECK AUTO LOGOUT TIME
*/


let loginTime =

Number(
localStorage.getItem("loginTime")
);



let autoMinutes =

Number(
localStorage.getItem("Auto_Logoff_Minutes")
);



if(!loginTime || !autoMinutes){

return;

}



let currentTime =
Date.now();



let usedMinutes =

(currentTime-loginTime)
/1000/60;



if(
usedMinutes > autoMinutes

){


alert(
"Session expired. Please login again."
);



localStorage.clear();


location.reload();


return;

}



/*
VALID SESSION
*/

showExpiryPopupIfNeeded(
expiryDate
);



}





/* ======================================
AUTO LOGOUT TIMER
====================================== */


setInterval(()=>{


if(
localStorage.getItem("login")
!=="yes"

){

return;

}



let loginTime =

Number(
localStorage.getItem("loginTime")
);



let autoMinutes =

Number(
localStorage.getItem("Auto_Logoff_Minutes")
);



let currentTime =
Date.now();



let usedMinutes =

(currentTime-loginTime)
/1000/60;



if(
usedMinutes > autoMinutes

){


alert(
"Session expired. Please login again."
);



logout();


}


},30000);

/* ======================================
LOGOUT
====================================== */

function logout(){

localStorage.clear();

location.reload();

}



/* ======================================
SHOW SCANNER
====================================== */

function showScanner(){


document.getElementById("loginPage").style.display="none";


document.getElementById("scannerPage").style.display="block";


startScanner();


}



/* ======================================
SCAN AGAIN
====================================== */

function scanAgain(){


document.getElementById("assetCard").innerHTML="";


startScanner();


}



/* ======================================
SHOW ASSET DETAILS
====================================== */

let html = `

</div>


`;




/* ======================================
INSTALLATION REPORT
====================================== */


if(
localStorage.getItem("Install")

){


html += `

<button onclick="openPDF('${a.Installation_PDF}')">

`;

}



/* ======================================
PMS REPORT
====================================== */


if(

){


html += `

<button onclick="openPDF('${a.PMS_PDF}')">

PMS Report

</button>

`;

}



/* ======================================
CALIBRATION REPORT
====================================== */


if(
localStorage.getItem("Cal")
==="Yes"

){


html += `

<button onclick="openPDF('${a.Calibration_PDF}')">

Calibration Report

</button>

`;

}



/* ======================================
IQ OQ PQ
====================================== */


if(

localStorage.getItem("IQ")==="Yes" ||

localStorage.getItem("OQ")==="Yes" ||

localStorage.getItem("PQ")==="Yes"

){


html += `

<div class="btn-row">

`;



if(
localStorage.getItem("IQ")
==="Yes"

){


html += `

<button class="small-btn"

onclick="openPDF('${a.IQ_PDF}')">

IQ

</button>

`;

}



if(
localStorage.getItem("OQ")
==="Yes"

){


html += `

<button class="small-btn"

onclick="openPDF('${a.OQ_PDF}')">

OQ

</button>

`;

}



if(
localStorage.getItem("PQ")
==="Yes"

){


html += `

<button class="small-btn"

onclick="openPDF('${a.PQ_PDF}')">

PQ

</button>

`;

}



html += `

</div>

`;



}



/* ======================================
APPROVAL
====================================== */


if(

localStorage.getItem("Approve")
==="Yes"

){


html += `


<button class="approve">

APPROVED

</button>


`;

}



document.getElementById("assetCard").innerHTML = html;


}

</script>
</body>
</html>
