<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Asset Scan2Maintain</title>


<script src="https://unpkg.com/html5-qrcode"></script>


<style>


body{

font-family:Arial;

background:#eef2f5;

margin:0;

padding:15px;

}


/* CARD */

.card{

max-width:380px;

margin:auto;

background:white;

padding:15px;

border-radius:15px;

box-shadow:0 2px 10px rgba(0,0,0,.15);

margin-top:15px;

}



/* TITLE */

.title{

text-align:center;

font-size:22px;

font-weight:bold;

color:#003366;

margin-bottom:10px;

}



/* LOGO */

.logo{

text-align:center;

margin-bottom:10px;

}


.logo img{

max-width:100%;

height:auto;

}



/* LOGIN INPUT */

.login-input{

width:100%;

padding:10px;

margin-top:10px;

border:1px solid #ccc;

border-radius:6px;

box-sizing:border-box;

font-size:15px;

}



/* BUTTON */

button{

width:100%;

padding:12px;

margin-top:10px;

border:none;

border-radius:10px;

background:#1e6bb8;

color:white;

font-size:15px;

cursor:pointer;

}



.back-btn{

background:#ff9800;

}



.logout-btn{

background:red;

}



.approve{

background:#28a745;

font-weight:bold;

}



/* SCANNER */

#scannerPage{

display:none;

}



/* ROW */

.row{

display:grid;

grid-template-columns:130px 10px auto;

margin:8px 0;

align-items:start;

}


.label{

font-weight:bold;

color:#003366;

}


.colon{

text-align:center;

}


.value{

font-size:15px;

word-break:break-word;

}



/* BOX */

.box{

border:2px solid #007bff;

border-radius:10px;

padding:12px;

margin-top:12px;

background:#f4f9ff;

}



.box-title{

color:#007bff;

font-weight:bold;

font-size:16px;

margin-bottom:8px;

}



/* SMALL BUTTON */

.btn-row{

display:flex;

gap:5px;

}


.small-btn{

flex:1;

background:#28a745;

padding:8px;

}



/* EXPIRED PAGE */

.expired-box{

display:flex;

justify-content:center;

align-items:center;

height:100vh;

text-align:center;

padding:20px;

}



.expired-box h1{

color:red;

font-size:28px;

}



/* LICENSE POPUP */


.popup-overlay{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.5);

display:flex;

justify-content:center;

align-items:center;

z-index:9999;

}



.popup-box{

background:white;

padding:25px;

border-radius:15px;

text-align:center;

max-width:320px;

}



.popup-box h2{

color:#ff6600;

}



</style>


</head>



<body>



<!-- ==========================
LOGIN PAGE
========================== -->


<div id="loginPage" class="card">


<div class="logo">

<img src="logo.jpg">

</div>


<div class="title">

Asset Scan2Maintain

</div>



<input

id="username"

class="login-input"

placeholder="Username">



<input

id="password"

type="password"

class="login-input"

placeholder="Password">



<button onclick="login()">

Login

</button>



<div

id="msg"

style="color:red;text-align:center;margin-top:10px;">

</div>



</div>





<!-- ==========================
SCANNER PAGE
========================== -->


<div id="scannerPage">


<div class="card">


<div class="logo">

<img src="logo.jpg">

</div>


<div class="title">

Asset Scan2Maintain

</div>



<div id="reader"></div>



<div id="assetCard"></div>



<button

onclick="scanAgain()"

class="back-btn">

Back To Scanner

</button>



<button

onclick="logout()"

class="logout-btn">

Logout

</button>



</div>


</div>

  <script>


/* =====================================
CONFIGURATION
===================================== */


const SHEET_ID =
"1SjnaZ-OLmpZ95qr-yoMWvVGd52GCY0ziRaMqjkVq0ZY";


const LOGIN_URL =
`https://opensheet.elk.sh/${SHEET_ID}/Users`;


const ASSET_URL =
`https://opensheet.elk.sh/${SHEET_ID}/Equipment`;



/* CENTRAL LICENSE SERVER */

const LICENSE_URL =
"https://script.google.com/macros/s/AKfycbx4iPGSij3YpAKUBMw270RfDGZocIJcnalwfxyuDTKt3e9pIYCp2u0GjmYkGL66tnzt0A/exec";



let qr;



/* =====================================
LOGIN FUNCTION
===================================== */


function login(){


let u =
document.getElementById("username").value.trim();


let p =
document.getElementById("password").value.trim();



if(u==="" || p===""){


document.getElementById("msg").innerHTML =
"Please enter username and password";


return;

}




fetch(LOGIN_URL)



.then(response=>response.json())



.then(data=>{



console.log("USER DATA:",data);



let user = data.find(x=>


String(x.Username || "")
.trim()
.toLowerCase()
===

u.trim().toLowerCase()


&&


String(x.Password || "")
.trim()
===

p.trim()



);




if(!user){


document.getElementById("msg").innerHTML =
"Invalid Login";


return;


}




/* ===============================
CLEAR OLD SESSION
=============================== */


localStorage.clear();




/* ===============================
SAVE LOGIN SESSION
=============================== */


localStorage.setItem(
"login",
"yes"
);



localStorage.setItem(
"loginTime",
Date.now()
);



localStorage.setItem(
"Auto_Logoff_Minutes",
user.Auto_Logoff_Minutes || "30"
);






/* ===============================
SAVE USER RIGHTS
=============================== */


localStorage.setItem(
"Install",
user.Installation==="Yes"
?"Yes":"No"
);



localStorage.setItem(
"IQ",
user.IQ==="Yes"
?"Yes":"No"
);



localStorage.setItem(
"OQ",
user.OQ==="Yes"
?"Yes":"No"
);



localStorage.setItem(
"PQ",
user.PQ==="Yes"
?"Yes":"No"
);



localStorage.setItem(
"PMS",
user.PMS==="Yes"
?"Yes":"No"
);



localStorage.setItem(
"Cal",
user.Calibration==="Yes"
?"Yes":"No"
);



localStorage.setItem(
"Approve",
user.Approve==="Yes"
?"Yes":"No"
);






/* ===============================
SAVE HOSPITAL LICENSE DETAILS

FROM USER SHEET

=============================== */


localStorage.setItem(
"Hospital_ID",
user.Hospital_ID || ""
);



localStorage.setItem(
"License_Key",
user.License_Key || ""
);






/* ===============================
CHECK LICENSE

=============================== */


checkCentralLicense(
user.Hospital_ID,
user.License_Key
);



})



.catch(error=>{


console.error(error);


document.getElementById("msg").innerHTML =

"Unable to connect login server";


});


}






/* =====================================
CENTRAL LICENSE CHECK
===================================== */


function checkCentralLicense(

hospitalID,

licenseKey

){



let url =

LICENSE_URL +

"?hospitalID=" +

encodeURIComponent(hospitalID)

+

"&key="

+

encodeURIComponent(licenseKey);





fetch(url)



.then(response=>{


if(!response.ok){


throw new Error(
"License server error"
);


}


return response.json();


})



.then(data=>{


console.log(
"CENTRAL LICENSE:",
data
);




if(

String(data.status)
.trim()
.toUpperCase()

!==

"VALID"

){



document.body.innerHTML = `


<div class="expired-box">

<div>

<h1>

Subscription Expired

<br><br>

Please contact Administrator

</h1>

</div>

</div>



`;



return;


}





/* SAVE EXPIRY DATE */


localStorage.setItem(

"Central_Expiry",

data.expiry || ""

);





/* OPEN EXPIRY CHECK */


showExpiryPopupIfNeeded(
data.expiry,
data.daysLeft
);



.catch(error=>{


console.error(error);



document.body.innerHTML = `


<div class="expired-box">

<div>

<h1>

Unable to verify subscription

<br><br>

Please check internet connection

</h1>


</div>

</div>



`;



});



}
/* =====================================
LICENSE EXPIRY CHECK
===================================== */


function showExpiryPopupIfNeeded(expiryDate,daysLeft){


daysLeft = Number(daysLeft);



if(daysLeft < 0){


document.body.innerHTML=`

<div class="expired-box">
<div>

<h1>

Your subscription has expired.

<br><br>

Please contact Administrator

</h1>

</div>
</div>

`;

return;

}




if(daysLeft <=15){



let popup=document.createElement("div");


popup.className="popup-overlay";



popup.innerHTML=`

<div class="popup-box">

<h2>
License Notice
</h2>


<p>

Your license expires on

<br><br>

<b>${expiryDate}</b>


<br><br>

Only ${daysLeft} day(s) remaining.

</p>

</div>

`;



document.body.appendChild(popup);



setTimeout(()=>{

popup.remove();

showScanner();

},4000);



}

else{


showScanner();


}


}


let parts = expiryDate.split("-");


let expiry = new Date(

Number(parts[2]),

Number(parts[1])-1,

Number(parts[0])

);



let today = new Date();



today.setHours(0,0,0,0);

expiry.setHours(0,0,0,0);



let daysLeft = Math.ceil(

(expiry - today)

/

(1000*60*60*24)

);





if(daysLeft < 0){



document.body.innerHTML = `


<div class="expired-box">

<div>

<h1>

Your subscription has expired.

<br><br>

Please contact Administrator

</h1>

</div>

</div>


`;



return;

}






/* SHOW WARNING BEFORE 15 DAYS */


if(daysLeft <=15){



let popup=document.createElement("div");


popup.className="popup-overlay";



popup.innerHTML=`


<div class="popup-box">


<h2>

License Notice

</h2>



<p>

Your license expires on

<br><br>

<b>${expiryDate}</b>


<br><br>


Only ${daysLeft} day(s) remaining.


</p>


</div>


`;



document.body.appendChild(popup);




setTimeout(()=>{


popup.remove();


showScanner();



},4000);



}

else{


showScanner();


}



}






/* =====================================
AUTO LOGIN AFTER REFRESH
===================================== */


window.onload=function(){


if(

localStorage.getItem("login")

==="yes"

){


checkAutoLogin();


}



};







function checkAutoLogin(){



let expiryDate =

localStorage.getItem(
"Central_Expiry"
);




/* ==============================
CHECK EXPIRY
============================== */


if(expiryDate){


let parts =
expiryDate.split("-");



let expiry = new Date(

Number(parts[2]),

Number(parts[1])-1,

Number(parts[0])

);



let today=new Date();



today.setHours(0,0,0,0);

expiry.setHours(0,0,0,0);



if(today > expiry){



localStorage.clear();



document.body.innerHTML=`


<div class="expired-box">

<div>

<h1>

Your subscription has expired.

<br><br>

Please contact Administrator

</h1>

</div>

</div>


`;



return;


}



}






/* ==============================
AUTO LOGOUT CHECK
============================== */


let loginTime = Number(

localStorage.getItem(
"loginTime"

)

);



let autoMinutes = Number(

localStorage.getItem(
"Auto_Logoff_Minutes"

)

);



if(loginTime && autoMinutes){



let usedMinutes =

(Date.now()-loginTime)

/

1000

/

60;



if(usedMinutes > autoMinutes){



alert(
"Session expired. Please login again."
);



localStorage.clear();


location.reload();


return;


}



}





/* ==============================
VALID SESSION
============================== */


showScanner();



}







/* =====================================
AUTO LOGOUT TIMER
===================================== */


setInterval(()=>{



if(

localStorage.getItem("login")

!=="yes"

){


return;


}



let loginTime = Number(

localStorage.getItem(
"loginTime"

)

);



let autoMinutes = Number(

localStorage.getItem(
"Auto_Logoff_Minutes"

)

);



if(!loginTime || !autoMinutes){

return;

}



let usedMinutes =

(Date.now()-loginTime)

/

1000

/

60;




if(usedMinutes > autoMinutes){



alert(
"Session expired. Please login again."
);



logout();



}



},30000);







/* =====================================
LOGOUT
===================================== */


function logout(){



localStorage.clear();


location.reload();



}






/* =====================================
SHOW SCANNER PAGE
===================================== */


function showScanner(){



document.getElementById("loginPage").style.display="none";



document.getElementById("scannerPage").style.display="block";



startScanner();



}






/* =====================================
SCAN AGAIN
===================================== */


function scanAgain(){



document.getElementById("assetCard").innerHTML="";


startScanner();



}
/* =====================================
SHOW ASSET DETAILS
===================================== */


function showAsset(a){


let html = `


<div class="box">


<div class="box-title">
Equipment Details
</div>


<div class="row">
<div class="label">Asset No</div>
<div class="colon">:</div>
<div class="value">${a.Asset_No || "-"}</div>
</div>


<div class="row">
<div class="label">Department</div>
<div class="colon">:</div>
<div class="value">${a.Department || "-"}</div>
</div>


<div class="row">
<div class="label">Equipment</div>
<div class="colon">:</div>
<div class="value">${a.Equipment || "-"}</div>
</div>


<div class="row">
<div class="label">Model</div>
<div class="colon">:</div>
<div class="value">${a.Model || "-"}</div>
</div>


<div class="row">
<div class="label">Make</div>
<div class="colon">:</div>
<div class="value">${a.Make || "-"}</div>
</div>


<div class="row">
<div class="label">Serial No</div>
<div class="colon">:</div>
<div class="value">${a.Serial_No || "-"}</div>
</div>


</div>






<div class="box">


<div class="box-title">
PMS Details
</div>


<div class="row">
<div class="label">PMS Done On</div>
<div class="colon">:</div>
<div class="value">${a.PMS_Done_On || "-"}</div>
</div>


<div class="row">
<div class="label">PMS Due On</div>
<div class="colon">:</div>
<div class="value">${a.PMS_Due_On || "-"}</div>
</div>


</div>






<div class="box">


<div class="box-title">
Calibration Details
</div>


<div class="row">
<div class="label">CAL Done On</div>
<div class="colon">:</div>
<div class="value">${a.Calibration_Done_On || "-"}</div>
</div>


<div class="row">
<div class="label">CAL Due On</div>
<div class="colon">:</div>
<div class="value">${a.Calibration_Due_On || "-"}</div>
</div>


</div>


`;




/* INSTALLATION */


if(localStorage.getItem("Install")==="Yes"){


html += `


<button onclick="openPDF('${a.Installation_PDF || ""}')">

Installation Report

</button>


`;

}




/* PMS */


if(localStorage.getItem("PMS")==="Yes"){


html += `


<button onclick="openPDF('${a.PMS_PDF || ""}')">

PMS Report

</button>


`;

}




/* CALIBRATION */


if(localStorage.getItem("Cal")==="Yes"){


html += `


<button onclick="openPDF('${a.Calibration_PDF || ""}')">

Calibration Report

</button>


`;

}





/* IQ OQ PQ */


if(

localStorage.getItem("IQ")==="Yes" ||

localStorage.getItem("OQ")==="Yes" ||

localStorage.getItem("PQ")==="Yes"

){


html += `<div class="btn-row">`;



if(localStorage.getItem("IQ")==="Yes"){


html += `


<button class="small-btn"

onclick="openPDF('${a.IQ_PDF || ""}')">

IQ

</button>


`;

}



if(localStorage.getItem("OQ")==="Yes"){


html += `


<button class="small-btn"

onclick="openPDF('${a.OQ_PDF || ""}')">

OQ

</button>


`;

}



if(localStorage.getItem("PQ")==="Yes"){


html += `


<button class="small-btn"

onclick="openPDF('${a.PQ_PDF || ""}')">

PQ

</button>


`;

}


html += `</div>`;


}





/* APPROVAL */


if(localStorage.getItem("Approve")==="Yes"){


html += `


<button class="approve">

APPROVED

</button>


`;

}




document.getElementById("assetCard").innerHTML = html;



}






/* =====================================
OPEN PDF
===================================== */


function openPDF(url){



if(!url || url.trim()===""){


alert("PDF not available");


return;


}



window.open(url,"_blank");



}








/* =====================================
QR SCANNER
===================================== */


function startScanner(){



let reader=document.getElementById("reader");


reader.innerHTML="";



qr=new Html5Qrcode("reader");



Html5Qrcode.getCameras()



.then(cameras=>{



if(!cameras || cameras.length===0){


alert("No camera found");


return;


}





let camera = cameras.find(c=>

c.label.toLowerCase().includes("back")

);



let cameraId;



if(camera){


cameraId=camera.id;


}

else{


cameraId=cameras[0].id;


}






qr.start(


cameraId,


{

fps:10,

qrbox:250

},




(decodedText)=>{



qr.stop()

.then(()=>{



fetch(ASSET_URL)



.then(response=>response.json())



.then(data=>{



let asset=data.find(x=>


String(x.Asset_No)

.trim()

===

String(decodedText)

.trim()



);



if(!asset){


alert("Asset not found");


startScanner();


return;


}



showAsset(asset);



})



.catch(error=>{


console.error(error);


alert("Unable to load asset data");


});




})

.catch(error=>{


console.error(error);


});



},



(errorMessage)=>{


// ignore scan errors


}



)



.catch(error=>{


console.error(error);


alert(
"Camera start error : "+error
);


});




})



.catch(error=>{


console.error(error);


alert(
"Camera access error : "+error
);


});



}





</script>


</body>

</html>
